                          <span style={{fontSize:11,fontWeight:700}}>{c.user_name||"?"}</span>
                          <span style={{fontSize:10,color:"var(--accent)",fontFamily:"var(--font-mono)"}}>AC-{String(t.order_number||0).padStart(4,"0")}</span>
                          <span style={{fontSize:10,color:"var(--muted)",marginLeft:"auto"}}>{ago}</span>
                        </div>
                        <p style={{fontSize:12,color:"var(--muted2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.text}</p>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })()}
          {myUrgent.length>0&&(
            <div style={{background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.2)",borderRadius:14,padding:16,marginBottom:16}}>
              <p style={{fontSize:13,fontWeight:700,color:"#fca5a5",marginBottom:10}}><Icon n="vencida" size={13} style={{marginRight:4}}/> Requieren atención inmediata</p>
              {myUrgent.slice(0,3).map(t=>(
                <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0",borderBottom:"1px solid rgba(239,68,68,.1)"}}>
                  {t.order_number&&<span style={{fontSize:11,color:"#fca5a5",fontWeight:700}}>#{String(t.order_number).padStart(4,"0")}</span>}
                  <span style={{flex:1,fontSize:13}}>{t.title}</span>
                  <span style={{fontSize:11,color:"var(--muted)"}}>{(()=>{const dr=fmtDateRelative(t.due_date);return <span style={{color:dr.color,fontWeight:700}}>{dr.label}</span>;})()}</span>
                </div>
              ))}
            </div>
          )}
          <div>
            <h3 style={{fontSize:15,fontWeight:700,marginBottom:12}}>Mis tareas activas</h3>
            {myActive.length===0
              ?<div className="empty"><div style={{fontSize:36,opacity:.4}}>🎉</div><p>Sin tareas pendientes</p></div>
              :myActive.map(t=>{
                const team=teams.find(x=>x.id===t.team_id);
                return(
                  <div key={t.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:12,marginBottom:8,cursor:"pointer"}} onClick={()=>onNavigate("ordenes")}>
                    {t.order_number&&<span style={{fontSize:11,fontWeight:700,color:"var(--accent)",minWidth:45}}>#{String(t.order_number).padStart(4,"0")}</span>}
                    <div style={{flex:1}}>
                      <p style={{fontSize:13,fontWeight:600}}>{t.title}</p>
                      <p style={{fontSize:11,color:"var(--muted)"}}>{team?.name} · <span style={{color:fmtDateRelative(t.due_date).color,fontWeight:fmtDateRelative(t.due_date).urgent?700:400}}>{fmtDateRelative(t.due_date).label}</span></p>
                    </div>
                    <span className={`pill ${statusPill[t.status]||"pill-gray"}`}>{statusLabel[t.status]}</span>
                  </div>
                );
              })
            }
          </div>
        </>
      )}

      {/* DIRECTOR/CUENTAS VIEW */}
      {(isDir||isCuentas)&&(
        <>
          <div style={{marginBottom:20}}>
            <h2 style={{fontSize:20,fontWeight:700,marginBottom:4}}><Icon n="desempeno" size={20} style={{marginLeft:6}} color="var(--accent)"/></h2>
            <p style={{color:"var(--muted)",fontSize:14}}>{new Date().toLocaleDateString("es-GT",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</p>
          </div>

          {/* HERO: Tareas activas — stacked bar por marca, click navega, hover muestra info */}
          {(()=>{
            const teamData=teams.map(t=>({
              ...t,
              color:teamColor(t), // override DB color with stable brand color
              count:allActive.filter(x=>x.team_id===t.id).length,
            })).filter(t=>t.count>0).sort((a,b)=>b.count-a.count);
            const noTeam=allActive.filter(x=>!x.team_id).length;
            if(noTeam>0)teamData.push({id:"none",name:"Sin equipo",color:"#555",count:noTeam});
            const total=allActive.length;
            const totalForPct=Math.max(total,1);

            return(
              <div className="card" style={{marginBottom:16,padding:"18px 22px"}}>
                {/* Header row: total + status + action */}
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,gap:12,flexWrap:"wrap"}}>
                  <div style={{display:"flex",alignItems:"baseline",gap:14}}>
                    <div style={{display:"flex",alignItems:"baseline",gap:8}}>
                      <span style={{fontSize:42,fontWeight:800,lineHeight:1,fontFamily:"var(--font-display)",letterSpacing:"-.04em",color:"var(--text)"}}>{total}</span>
                      <span style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".12em",fontFamily:"var(--font-mono)"}}>tareas activas</span>
                    </div>
                    <div style={{display:"flex",gap:10,fontSize:11,color:"var(--muted)",fontFamily:"var(--font-mono)"}}>
                      <span style={{color:"var(--s-progreso)"}}><Icon n="progreso" size={11} style={{marginRight:3}}/>{inProgress.length}</span>
                      <span style={{color:"var(--s-revision)"}}>🔍 {forReview.length}</span>
                      {onPause.length>0&&<span style={{color:"var(--s-pausa)"}}><Icon n="pausa" size={11} style={{marginRight:3}}/>{onPause.length}</span>}
                    </div>
                  </div>
                  <button onClick={()=>onNavigate("ordenes")}
                    style={{fontSize:11,color:"var(--accent)",background:"var(--accent-dim)",border:"1px solid rgba(232,197,71,.2)",padding:"5px 12px",borderRadius:6,cursor:"pointer",fontFamily:"var(--font-body)",fontWeight:700}}>
                    Ver todas →
                  </button>
                </div>

                {/* Stacked horizontal bar — segments are clickable, tooltip on hover */}
                {teamData.length===0
                  ?<div style={{padding:20,textAlign:"center",color:"var(--muted)",fontSize:13}}>Sin tareas activas 🎉</div>
                  :(
                    <>
                      <div style={{display:"flex",height:38,borderRadius:6,overflow:"hidden",background:"var(--bg3)",marginBottom:10,position:"relative"}}>
                        {teamData.map((s,i)=>{
                          const w=(s.count/totalForPct)*100;
                          return(
                            <div key={s.id} onClick={()=>s.id!=="none"&&onNavigate("equipo_"+s.id)}
                              title={`${s.name} · ${s.count} ${s.count===1?"tarea":"tareas"} · ${Math.round(s.count/totalForPct*100)}%`}
                              style={{width:`${w}%`,background:s.color,cursor:s.id!=="none"?"pointer":"default",
                                display:"flex",alignItems:"center",justifyContent:"center",
                                position:"relative",transition:"all .2s",
                                borderRight:i<teamData.length-1?"2px solid var(--bg2)":"none"}}
                              onMouseEnter={e=>{e.currentTarget.style.filter="brightness(1.15)";}}
                              onMouseLeave={e=>{e.currentTarget.style.filter="brightness(1)";}}>
                              {w>=8&&(
                                <span style={{fontSize:13,fontWeight:800,color:"#0d0d0d",fontFamily:"var(--font-display)",textShadow:"0 1px 2px rgba(0,0,0,.15)"}}>{s.count}</span>
                              )}
                            </div>
                          );
                        })}
                      </div>

                      {/* Compact legend grid — color dot + name + count, click navigates */}
                      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:6}}>
                        {teamData.map(s=>(
                          <div key={s.id} onClick={()=>s.id!=="none"&&onNavigate("equipo_"+s.id)}
                            title={`${s.name}: ${s.count} ${s.count===1?"tarea":"tareas"}`}
                            style={{display:"flex",alignItems:"center",gap:7,padding:"5px 8px",borderRadius:5,
                              cursor:s.id!=="none"?"pointer":"default",transition:".13s",background:"transparent"}}
                            onMouseEnter={e=>{if(s.id!=="none")e.currentTarget.style.background="var(--bg3)";}}
                            onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                            <div style={{width:8,height:8,borderRadius:2,background:s.color,flexShrink:0}}/>
                            <span style={{fontSize:11.5,color:"var(--muted2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{s.name}</span>
                            <span style={{fontSize:11,fontWeight:700,color:s.color,fontFamily:"var(--font-mono)"}}>{s.count}</span>
                            <span style={{fontSize:10,color:"var(--muted)",fontFamily:"var(--font-mono)",minWidth:28,textAlign:"right"}}>{Math.round(s.count/totalForPct*100)}%</span>
                          </div>
                        ))}
                      </div>
                    </>
                  )
                }
              </div>
            );
          })()}

          {/* SECONDARY METRICS — smaller cards now */}
          <div className="stat-grid" style={{marginBottom:20,gridTemplateColumns:"repeat(3,1fr)"}}>
            <div className="stat-card" style={{"--ac":"var(--s-revision)",cursor:"pointer"}} onClick={()=>onNavigate("ordenes","en_revision")}>
              <div className="stat-label">En revisión</div>
              <div className="stat-value" style={{color:"var(--s-revision)"}}>{forReview.length}</div>
              <div className="stat-sub">Esperando aprobación</div>
            </div>
            <div className="stat-card" style={{"--ac":overdue.length>0?"var(--s-vencida)":"var(--s-completada)",cursor:"pointer"}} onClick={()=>onNavigate("ordenes","vencida")}>
              <div className="stat-label">Vencidas</div>
              <div className="stat-value" style={{color:overdue.length>0?"var(--s-vencida)":"var(--s-completada)"}}>{overdue.length}</div>
              <div className="stat-sub">{overdue.length===0?"Todo al día":"Requieren atención"}</div>
            </div>
            <div className="stat-card" style={{"--ac":"var(--s-completada)",cursor:"pointer"}} onClick={()=>onNavigate("ordenes","completada")}>
              <div className="stat-label">Completadas</div>
              <div className="stat-value" style={{color:"var(--s-completada)"}}>{tasks.filter(t=>t.status==="completada").length}</div>
              <div className="stat-sub">Este período →</div>
            </div>
          </div>

          {/* MENTIONS — comentarios donde me mencionaron */}
          {(()=>{
            const myMentions=[];
            tasks.forEach(t=>{
              const cs=Array.isArray(t.comments)?t.comments:[];
              cs.forEach(c=>{
                if(Array.isArray(c.mentions)&&c.mentions.includes(me.id)&&c.user_id!==me.id){
                  myMentions.push({task:t,comment:c});
                }
              });
            });
            // Sort newest first
            myMentions.sort((a,b)=>new Date(b.comment.created_at)-new Date(a.comment.created_at));
            if(myMentions.length===0)return null;
            return(
              <div className="card" style={{marginBottom:14,borderLeft:"3px solid var(--accent)"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                  <h3 style={{fontSize:15,fontWeight:700}}><Icon n="comentar" size={14} style={{marginRight:6}}/>Te mencionaron</h3>
                  <span style={{fontSize:11,padding:"2px 8px",borderRadius:10,background:"var(--accent)",color:"#0d0d0d",fontWeight:700,fontFamily:"var(--font-mono)"}}>{myMentions.length}</span>
                </div>
                {myMentions.slice(0,4).map(({task:t,comment:c},i)=>{
                  const author=users.find(u=>u.id===c.user_id);
                  const tm=new Date(c.created_at);
                  const ago=(()=>{const diff=Date.now()-tm;const h=Math.floor(diff/3600000);if(h<1)return"Hace un momento";if(h<24)return`Hace ${h}h`;return`Hace ${Math.floor(h/24)}d`;})();
                  return(
                    <div key={c.id} onClick={()=>onNavigate("ordenes")}
                      style={{display:"flex",gap:10,padding:"9px 0",borderBottom:i<Math.min(3,myMentions.length-1)?"1px solid var(--border)":"none",cursor:"pointer"}}>
                      <Av u={author||{initials:"?",avatar_color:"#888"}} size={26}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:2,flexWrap:"wrap"}}>
                          <span style={{fontSize:12,fontWeight:700,color:author?.avatar_color||"var(--text)"}}>{c.user_name||"?"}</span>
                          <span style={{fontSize:10,color:"var(--accent)",fontFamily:"var(--font-mono)"}}>AC-{String(t.order_number||0).padStart(4,"0")}</span>
                          <span style={{fontSize:10,color:"var(--muted)"}}>{ago}</span>
                        </div>
                        <p style={{fontSize:12,color:"var(--muted2)",lineHeight:1.4,overflow:"hidden",textOverflow:"ellipsis",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{c.text}</p>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })()}

          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:12,marginBottom:14}}>
            {/* REVIEW QUEUE */}
            <div className="card">
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                <h3 style={{fontSize:15,fontWeight:700}}>🔍 Cola de revisión</h3>
                <span style={{fontSize:12,color:"var(--muted)"}}>{forReview.length}</span>
              </div>
              {forReview.length===0
                ?<p style={{fontSize:13,color:"var(--muted)",textAlign:"center",padding:16}}>Sin tareas en revisión</p>
                :forReview.slice(0,5).map(t=>{
                  const u=users.find(x=>x.id===t.assigned_to);
                  return(
                    <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
                      {t.order_number&&<span style={{fontSize:11,fontWeight:700,color:"var(--accent)",minWidth:40,fontFamily:"var(--font-mono)"}}>#{"AC-"+String(t.order_number).padStart(4,"0")}</span>}
                      <div style={{flex:1,minWidth:0}}>
                        <p style={{fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</p>
                        <p style={{fontSize:11,color:"var(--muted)"}}>{u?.name||"—"}</p>
                      </div>
                      <button onClick={e=>{e.stopPropagation();onNavigate("ordenes");}} style={{background:"var(--accent-dim)",border:"1px solid rgba(232,197,71,.2)",color:"var(--accent)",fontSize:11,padding:"3px 8px",borderRadius:5,cursor:"pointer",fontFamily:"var(--font-body)",whiteSpace:"nowrap",fontWeight:600}}>Ver →</button>
                    </div>
                  );
                })
              }
              {forReview.length>5&&<button onClick={()=>onNavigate("ordenes")} style={{width:"100%",marginTop:10,padding:"7px",background:"transparent",border:"1px solid var(--border)",borderRadius:6,color:"var(--muted2)",fontSize:12,cursor:"pointer",fontFamily:"var(--font-body)"}}>Ver {forReview.length-5} más →</button>}
            </div>

            {/* OVERDUE */}
            <div className="card" style={{borderColor:overdue.length>0?"rgba(239,68,68,.3)":"var(--border)"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                <h3 style={{fontSize:15,fontWeight:700,color:overdue.length>0?"#fca5a5":"var(--text)"}}><Icon n="vencida" size={14} style={{marginRight:6}}/> Vencidas</h3>
                <span style={{fontSize:12,color:"var(--muted)"}}>{overdue.length}</span>
              </div>
              {overdue.length===0
                ?<p style={{fontSize:13,color:"var(--green)",textAlign:"center",padding:16}}>✓ Todo al día</p>
                :overdue.slice(0,5).map(t=>{
                  const u=users.find(x=>x.id===t.assigned_to);
                  const days=Math.ceil((new Date()-new Date(t.due_date+"T00:00:00"))/(1000*60*60*24));
                  return(
                    <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid rgba(240,107,107,.1)"}}>
                      {t.order_number&&<span style={{fontSize:11,fontWeight:700,color:"var(--red)",minWidth:40,fontFamily:"var(--font-mono)"}}>#{"AC-"+String(t.order_number).padStart(4,"0")}</span>}
                      <div style={{flex:1,minWidth:0}}>
                        <p style={{fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</p>
                        <p style={{fontSize:11,color:"var(--muted)"}}>{u?.name||"—"}</p>
                      </div>
                      <span style={{fontSize:11,background:"rgba(240,107,107,.12)",color:"var(--red)",fontWeight:700,flexShrink:0,padding:"2px 7px",borderRadius:4}}>{days}d tarde</span>
                    </div>
                  );
                })
              }
              {overdue.length>0&&<button onClick={()=>onNavigate("ordenes")} style={{width:"100%",marginTop:10,padding:"7px",background:"rgba(240,107,107,.08)",border:"1px solid rgba(240,107,107,.2)",borderRadius:6,color:"var(--red)",fontSize:12,cursor:"pointer",fontFamily:"var(--font-body)",fontWeight:600}}>Ver todas las vencidas →</button>}
            </div>
          </div>

          {/* TEAM SEMAPHORE */}
          {isDir&&(
            <div className="card" style={{marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                <div>
                  <h3 style={{fontSize:15,fontWeight:700}}>🚦 Semáforo de equipos</h3>
                  <p style={{fontSize:11,color:"var(--muted)",marginTop:2,fontFamily:"var(--font-mono)"}}>🟢 Libre · 🟡 Cargado ≥4/pers · 🔴 Urgente o sobrecarga ≥7/pers</p>
                </div>
                <button onClick={()=>onNavigate("admin")} style={{
                  display:"flex",alignItems:"center",gap:5,
                  background:"var(--accent-dim)",border:"1px solid rgba(232,197,71,.2)",
                  color:"var(--accent)",fontSize:11,fontWeight:700,
                  padding:"4px 10px",borderRadius:6,cursor:"pointer",
                  fontFamily:"var(--font-body)",letterSpacing:".02em",flexShrink:0
                }}>+ Nuevo equipo</button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:10}}>
                {teams.map(team=>{
                  const members=users.filter(u=>(u.team_id===team.id||(Array.isArray(u.team_ids)&&u.team_ids.includes(team.id)))&&u.role==="colaborador");
                  const teamTasks=tasks.filter(t=>t.team_id===team.id&&t.status!=="completada");
                  const teamOverdue=tasks.filter(t=>t.team_id===team.id&&t.status==="vencida").length;
                  const overloaded=members.filter(u=>tasks.filter(x=>{const a=Array.isArray(x.assigned_to)?x.assigned_to:[x.assigned_to].filter(Boolean);return a.includes(u.id)&&x.status!=="completada";}).length>=7).length;
                  const avgLoad=members.length>0?teamTasks.length/members.length:0;
                  // Traffic light logic:
                  // 🔴 RED: any overdue tasks OR any member overloaded (≥7 tasks)
                  // 🟡 YELLOW: avg load ≥4 per member
                  // 🟢 GREEN: all good
                  const health=teamOverdue>0||overloaded>0?"red":avgLoad>=4?"yellow":"green";
                  const healthColor={red:"var(--load-crit)",yellow:"var(--load-warn)",green:"var(--load-ok)"}[health];
                  const healthLabel={
                    red:teamOverdue>0?`${teamOverdue} vencida${teamOverdue>1?"s":""}`:overloaded>0?`${overloaded} sobrecargado${overloaded>1?"s":""}`:"-",
                    yellow:`~${Math.round(avgLoad*10)/10} tareas/persona`,
                    green:members.length===0?"Sin miembros":"Al día"
                  }[health];
                  return(
                    <div key={team.id} onClick={()=>onNavigate("equipo_"+team.id)}
                      style={{padding:"12px 14px",background:"var(--bg3)",borderRadius:10,
                        border:`1px solid ${healthColor}55`,cursor:"pointer",
                        transition:".15s",position:"relative",overflow:"hidden"}}>
                      {/* Color strip top */}
                      <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:healthColor,opacity:.8}}/>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,marginTop:2}}>
                        <div style={{width:9,height:9,borderRadius:"50%",background:healthColor,
                          boxShadow:`0 0 8px ${healthColor}`,flexShrink:0}}/>
                        <span style={{fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{team.name}</span>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--muted)",marginBottom:5}}>
                        <span><strong style={{color:"var(--text)",fontSize:13}}>{teamTasks.length}</strong> activas</span>
                        <span><strong style={{color:"var(--text)",fontSize:13}}>{members.length}</strong> miembros</span>
                      </div>
                      <div style={{fontSize:11,fontWeight:600,color:healthColor,fontFamily:"var(--font-mono)"}}>{healthLabel}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* WORKLOAD CHART */}
          <div className="card">
            <h3 style={{fontSize:15,fontWeight:700,marginBottom:14}}>⚖️ Carga de trabajo por colaborador</h3>
            {workload.length===0
              ?<p style={{fontSize:13,color:"var(--muted)",textAlign:"center",padding:16}}>No hay colaboradores aún.</p>
              :workload.map(w=>{
                const team=teams.find(t=>t.id===w.team_id);
                const pct=Math.round((w.active/maxLoad)*100);
                const color=w.active>=7?"var(--s-vencida)":w.active>=4?"var(--load-warn)":(team?teamColor(team):"var(--s-completada)");
                return(
                  <div key={w.id} style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                    <div className="avatar" style={{width:30,height:30,background:w.avatar_color,fontSize:11,color:"#fff",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,flexShrink:0}}>{w.initials}</div>
                    <div style={{minWidth:110,flexShrink:0}}>
                      <p style={{fontSize:12,fontWeight:600}}>{w.name}</p>
                      <p style={{fontSize:10,color:"var(--muted)"}}>{team?.name||"Sin equipo"}</p>
                    </div>
                    <div style={{flex:1,height:8,background:"var(--bg3)",borderRadius:4,overflow:"hidden"}}>
                      <div style={{width:pct+"%",height:"100%",background:color,borderRadius:4,transition:"width .5s"}}/>
                    </div>
                    <div style={{minWidth:60,textAlign:"right",flexShrink:0}}>
                      <span style={{fontSize:13,fontWeight:700,color:color}}>{w.active}</span>
                      <span style={{fontSize:11,color:"var(--muted)"}}> activas</span>
                    </div>
                    {w.overdue>0&&<span style={{fontSize:11,padding:"2px 6px",background:"rgba(239,68,68,.15)",color:"#fca5a5",borderRadius:999,flexShrink:0}}>{w.overdue} venc.</span>}
                  </div>
                );
              })
            }
          </div>
        </>
      )}
    </div>
  );
}

/* ── ORDENES ── */
function OrdenesView({tasks,users,teams,me,token,onRefresh,onBack,initialFilter}){
  const [viewMode,setViewMode]=useSessionFilters("ordenes_view","kanban");
  const [sf,setSf]=useSessionFilters("ordenes_status",initialFilter||"todas");
  const [tf,setTf]=useSessionFilters("ordenes_team","todas");
  const [search,setSearch]=useState("");
  const [collapsed,setCollapsed]=useState({}); // for equipo view
  const isDir=me.role==="director";
  const isCuentas=me.role==="cuentas";

  const visible=tasks.filter(t=>{
    let canSee=false;
    if(isDir) canSee=true;
    else if(isCuentas){
      const myTeamIds=Array.isArray(me.team_ids)&&me.team_ids.length>0?me.team_ids:null;
      canSee=myTeamIds?myTeamIds.includes(t.team_id):true;
    } else {
      // Colaborador: ONLY tasks directly assigned to them
      const a=Array.isArray(t.assigned_to)?t.assigned_to:[t.assigned_to].filter(Boolean);
      canSee=a.includes(me.id);
    }
    const sm=!search||t.title?.toLowerCase().includes(search.toLowerCase())||(t.order_number&&("AC-"+String(t.order_number).padStart(4,"0")).toLowerCase().includes(search.toLowerCase()))||(t.marca||"").toLowerCase().includes(search.toLowerCase());
    return canSee&&(sf==="todas"||t.status===sf)&&(tf==="todas"||t.team_id===tf)&&sm;
  });

  // Status columns for Kanban
  const COLS=[
    {s:"vencida",     label:"Vencidas",    color:"var(--s-vencida)"},
    {s:"en_progreso", label:"En progreso", color:"var(--s-progreso)"},
    {s:"en_revision", label:"En revisión", color:"var(--s-revision)"},
    {s:"pendiente",   label:"Pendiente",   color:"var(--s-pendiente)"},
    {s:"en_pausa",    label:"En pausa",    color:"var(--s-pausa)"},
    {s:"completada",  label:"Completada",  color:"var(--s-completada)"},
  ];

  // Mini kanban card
  function KanbanCard({t}){
    const [modal,setModal]=useState(false);
    const assigned=Array.isArray(t.assigned_to)?t.assigned_to:[t.assigned_to].filter(Boolean);
    const dr=fmtDateRelative(t.due_date);
    return(
      <>
        <div className="kanban-card" onClick={()=>setModal(true)}
          style={{borderLeft:`3px solid ${statusColor[t.status]||"var(--border)"}`}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
            {t.order_number&&<span style={{fontSize:10,color:"var(--accent)",fontFamily:"var(--font-mono)",fontWeight:700}}>AC-{String(t.order_number).padStart(4,"0")}</span>}
            {t.priority!=="Normal"&&<span className={`pill pill-prio-${t.priority.toLowerCase()}`}>{t.priority}</span>}
          </div>
          <p style={{fontSize:12,fontWeight:600,lineHeight:1.4,marginBottom:6}}>{t.title}</p>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",gap:-4}}>
              {assigned.slice(0,3).map(id=>{const u=users.find(x=>x.id===id);return u?<div key={id} style={{width:18,height:18,borderRadius:4,background:u.avatar_color,fontSize:7,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,marginRight:2}}>{u.initials}</div>:null;})}
            </div>
            <span style={{fontSize:10,color:dr.color,fontWeight:dr.urgent?700:400,fontFamily:"var(--font-mono)"}}>{dr.label}</span>
          </div>
        </div>
        {modal&&(
          <ModalPortal>
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,zIndex:400,backdropFilter:"blur(6px)"}}
              onClick={e=>e.target===e.currentTarget&&setModal(false)}>
              <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:14,padding:24,width:"100%",maxWidth:640,maxHeight:"90vh",overflowY:"auto"}}
                onClick={e=>e.stopPropagation()}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
                  <span style={{fontSize:12,fontWeight:700,color:"var(--accent)",fontFamily:"var(--font-mono)"}}>AC-{String(t.order_number||0).padStart(4,"0")}</span>
                  <button onClick={()=>setModal(false)} style={{background:"none",border:"none",color:"var(--muted)",fontSize:18,cursor:"pointer"}}>✕</button>
                </div>
                <TaskCard task={t} users={users} teams={teams} me={me} token={token} onRefresh={()=>{onRefresh();setModal(false);}}/>
              </div>
            </div>
          </ModalPortal>
        )}
      </>
    );
  }

  return(
    <div>
      {onBack&&<BackBtn onClick={onBack}/>}
      <div className="section-header" style={{marginBottom:12}}>
        <h2 className="section-title">Órdenes de trabajo</h2>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          {/* View mode toggle */}
          <div style={{display:"flex",gap:2,background:"var(--bg3)",borderRadius:8,padding:3}}>
            {[{v:"kanban",l:"Kanban",icon:"kanban"},{v:"lista",l:"Lista",icon:"lista"},{v:"equipo",l:"Equipos",icon:"equipos"}].map(m=>(
              <button key={m.v} onClick={()=>setViewMode(m.v)}
                style={{padding:"4px 10px",borderRadius:6,fontSize:11,cursor:"pointer",fontFamily:"inherit",border:"none",
                  display:"flex",alignItems:"center",gap:5,
                  background:viewMode===m.v?"var(--bg2)":"transparent",
                  color:viewMode===m.v?"var(--text)":"var(--muted)",fontWeight:viewMode===m.v?600:400}}>
                <Icon n={m.icon} size={13}/>{m.l}
              </button>
            ))}
          </div>
          <span style={{fontSize:12,color:"var(--muted)"}}>{visible.length} orden{visible.length!==1?"es":""}</span>
        </div>
      </div>

      {/* Search + filters */}
      <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Buscar nombre, AC-0001, marca..."
          style={{flex:1,minWidth:200,fontSize:13}}/>
        {(isDir||isCuentas)&&(
          <select value={tf} onChange={e=>setTf(e.target.value)} style={{width:"auto",fontSize:12}}>
            <option value="todas">Todos los equipos</option>
            {teams.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
          </select>
        )}
      </div>

      {/* Status filter chips — shown in lista/equipo mode */}
      {viewMode!=="kanban"&&(
        <div className="filter-bar" style={{marginBottom:12}}>
          {["todas","vencida","en_progreso","en_revision","pendiente","en_pausa","completada"].map(s=>(
            <button key={s} className={`filter-chip${sf===s?" active":""}`}
              style={sf===s&&s!=="todas"?{background:statusColor[s],borderColor:statusColor[s],color:"#fff"}:{}}
              onClick={()=>setSf(s)}>
              {s==="todas"?"Todas":statusLabel[s]}
            </button>
          ))}
        </div>
      )}

      <StatusLegend/>

      {visible.length===0&&(
        <div className="empty"><div style={{opacity:.3,marginBottom:8}}><Icon n="ordenes" size={40} color="currentColor"/></div><p>No hay órdenes con estos filtros.</p></div>
      )}

      {/* ── KANBAN VIEW ── */}
      {viewMode==="kanban"&&visible.length>0&&(
        <div className="kanban-wrap">
          {COLS.map(col=>{
            const colTasks=visible.filter(t=>t.status===col.s);
            if(colTasks.length===0&&col.s!=="en_progreso"&&col.s!=="pendiente")return null;
            return(
              <div key={col.s} className="kanban-col">
                <div className="kanban-col-head">
                  <div style={{width:8,height:8,borderRadius:"50%",background:col.color,flexShrink:0}}/>
                  <span style={{fontSize:12,fontWeight:700,flex:1}}>{col.label}</span>
                  <span style={{fontSize:11,color:"var(--muted)",fontFamily:"var(--font-mono)",background:"var(--bg4)",borderRadius:4,padding:"1px 6px"}}>{colTasks.length}</span>
                </div>
                <div className="kanban-col-body">
                  {colTasks.length===0
                    ?<p style={{fontSize:12,color:"var(--muted)",textAlign:"center",padding:"16px 8px",opacity:.5}}>Sin tareas</p>
                    :colTasks.map(t=><KanbanCard key={t.id} t={t}/>)
                  }
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── LISTA VIEW — ordered by status priority ── */}
      {viewMode==="lista"&&visible.length>0&&(()=>{
        const order=["vencida","en_revision","en_progreso","pendiente","en_pausa","completada"];
        const sorted=[...visible].sort((a,b)=>order.indexOf(a.status)-order.indexOf(b.status));
        const active=sorted.filter(t=>t.status!=="completada");
        const done=sorted.filter(t=>t.status==="completada");
        return(
          <>
            {active.map(t=><TaskCard key={t.id} task={t} users={users} teams={teams} me={me} token={token} onRefresh={onRefresh}/>)}
            {done.length>0&&(
              <>
                <div style={{display:"flex",alignItems:"center",gap:10,margin:"16px 0 8px",opacity:.45}}>
                  <div style={{flex:1,height:1,background:"var(--border)"}}/>
                  <span style={{fontSize:11,color:"var(--muted)",fontFamily:"var(--font-mono)"}}><Icon n="completada" size={11} style={{marginRight:4}}/> Completadas ({done.length})</span>
                  <div style={{flex:1,height:1,background:"var(--border)"}}/>
                </div>
                {done.map(t=><TaskCard key={t.id} task={t} users={users} teams={teams} me={me} token={token} onRefresh={onRefresh}/>)}
              </>
            )}
          </>
        );
      })()}

      {/* ── EQUIPO VIEW — collapsible by team ── */}
      {viewMode==="equipo"&&visible.length>0&&(()=>{
        const teamsWithTasks=teams.filter(t=>visible.some(x=>x.team_id===t.id));
        const noTeam=visible.filter(t=>!t.team_id);
        return(
          <>
            {teamsWithTasks.map(team=>{
              const tTasks=visible.filter(t=>t.team_id===team.id);
              const isOpen=collapsed[team.id]!==true;
              const overdue=tTasks.filter(t=>t.status==="vencida").length;
              const inProg=tTasks.filter(t=>t.status==="en_progreso").length;
              const inRev=tTasks.filter(t=>t.status==="en_revision").length;
              return(
                <div key={team.id} style={{marginBottom:8,background:"var(--bg2)",borderRadius:10,border:"1px solid var(--border)",overflow:"hidden"}}>
                  <div onClick={()=>setCollapsed(c=>({...c,[team.id]:!c[team.id]}))}
                    style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",cursor:"pointer",
                      borderLeft:`4px solid ${teamColor(team)}`,background:isOpen?"var(--bg3)":"var(--bg2)"}}>
                    <span style={{fontSize:16}}>{<Icon n={team.icon||"equipos"} size={18} style={{display:"inline-block"}}/>}</span>
                    <span style={{fontWeight:700,fontSize:14,flex:1}}>{team.name}</span>
                    {/* Status mini-badges */}
                    <div style={{display:"flex",gap:4}}>
                      {overdue>0&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:3,background:"var(--s-vencida-bg)",color:"var(--s-vencida)",fontWeight:700,fontFamily:"var(--font-mono)"}}><Icon n="alerta" size={9}/>{overdue}</span>}
                      {inRev>0&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:3,background:"var(--s-revision-bg)",color:"var(--s-revision)",fontWeight:700,fontFamily:"var(--font-mono)"}}>🔍{inRev}</span>}
                      {inProg>0&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:3,background:"var(--s-progreso-bg)",color:"var(--s-progreso)",fontWeight:700,fontFamily:"var(--font-mono)"}}><Icon n="progreso" size={9}/>{inProg}</span>}
                      <span style={{fontSize:11,color:"var(--muted)",fontFamily:"var(--font-mono)",marginLeft:4}}>{tTasks.length}</span>
                    </div>
                    <span style={{color:"var(--muted)",transition:"transform .2s",transform:isOpen?"rotate(0)":"rotate(-90deg)",display:"inline-block"}}>▼</span>
                  </div>
                  {isOpen&&(
                    <div style={{padding:"6px 12px 12px"}}>
                      {[...tTasks].sort((a,b)=>["vencida","en_revision","en_progreso","pendiente","en_pausa","completada"].indexOf(a.status)-["vencida","en_revision","en_progreso","pendiente","en_pausa","completada"].indexOf(b.status))
                        .map(t=><TaskCard key={t.id} task={t} users={users} teams={teams} me={me} token={token} onRefresh={onRefresh}/>)}
                    </div>
                  )}
                </div>
              );
            })}
            {noTeam.length>0&&(
              <div style={{marginTop:8}}>
                <p style={{fontSize:11,color:"var(--muted)",fontFamily:"var(--font-mono)",marginBottom:6}}>Sin equipo asignado</p>
                {noTeam.map(t=><TaskCard key={t.id} task={t} users={users} teams={teams} me={me} token={token} onRefresh={onRefresh}/>)}
              </div>
            )}
          </>
        );
      })()}
    </div>
  );
}

/* ── TEAM DETAIL VIEW (collapsible collaborators) ── */
function TeamDetailView({team,teamTasks,teamUsers,allUsers,allTeams,me,token,onRefresh,onBack}){
  const [expanded,setExpanded]=useState({}); // userId -> boolean
  const [sfilt,setSfilt]=useState("activas"); // "activas" | "todas"
  const isDir=me.role==="director"||me.role==="cuentas";

  const displayTasks=sfilt==="todas"?teamTasks:teamTasks.filter(t=>t.status!=="completada");

  // Build grouped structure
  const grouped=[];const seen=new Set();
  displayTasks.forEach(t=>{
    const a=Array.isArray(t.assigned_to)?t.assigned_to:[t.assigned_to].filter(Boolean);
    a.forEach(id=>{if(!seen.has(id)){seen.add(id);grouped.push({userId:id});}});
  });
  grouped.forEach(g=>{
    g.tasks=displayTasks.filter(t=>{const a=Array.isArray(t.assigned_to)?t.assigned_to:[t.assigned_to].filter(Boolean);return a.includes(g.userId);});
  });
  const unassigned=displayTasks.filter(t=>!(Array.isArray(t.assigned_to)?t.assigned_to:[t.assigned_to].filter(Boolean)).some(id=>teamUsers.find(u=>u.id===id)));

  const toggle=(id)=>setExpanded(e=>({...e,[id]:!e[id]}));

  return(
    <div>
      <BackBtn onClick={onBack} label="← Equipos"/>
      <div className="section-header">
        <h2 className="section-title" style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{width:12,height:12,borderRadius:"50%",background:teamColor(team),boxShadow:`0 0 8px ${teamColor(team)}66`,display:"inline-block"}}/>
          {<Icon n={team.icon||"equipos"} size={18} style={{display:"inline-block"}}/>} {team.name}
        </h2>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{fontSize:12,color:"var(--muted)"}}>{displayTasks.filter(t=>t.status!=="completada").length} activas</span>
          <div style={{display:"flex",gap:3,background:"var(--bg3)",borderRadius:7,padding:3}}>
            {[{v:"activas",l:"Activas"},{v:"todas",l:"Todas"}].map(o=>(
              <button key={o.v} onClick={()=>setSfilt(o.v)}
                style={{padding:"4px 10px",borderRadius:5,fontSize:11,cursor:"pointer",border:"none",fontFamily:"inherit",
                  background:sfilt===o.v?"var(--bg2)":"transparent",color:sfilt===o.v?"var(--text)":"var(--muted)",fontWeight:sfilt===o.v?600:400}}>
                {o.l}
              </button>
            ))}
          </div>
          <button onClick={()=>{const allExp={};grouped.forEach(g=>{allExp[g.userId]=true;});setExpanded(allExp);}}
            style={{fontSize:11,color:"var(--muted)",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>Expandir todo</button>
          <button onClick={()=>setExpanded({})}
            style={{fontSize:11,color:"var(--muted)",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>Colapsar</button>
        </div>
      </div>

      {displayTasks.length===0
        ?<div className="empty"><div style={{opacity:.3,marginBottom:8}}><Icon n="ordenes" size={40} color="currentColor"/></div><p>No hay órdenes {sfilt==="activas"?"activas":"en este equipo"}.</p></div>
        :(
          <>
            {grouped.map(({userId,tasks:uTasks})=>{
              const u=allUsers.find(x=>x.id===userId);
              if(!u||uTasks.length===0)return null;
              const isOpen=expanded[userId]!==false; // default open
              const urgentes=uTasks.filter(t=>t.status==="vencida"||t.priority==="Urgente").length;
              const loadColor=uTasks.length>=7?"var(--s-vencida)":uTasks.length>=4?"var(--load-warn)":u.avatar_color;
              return(
                <div key={userId} style={{marginBottom:6,background:"var(--bg2)",borderRadius:10,border:`1px solid var(--border)`,overflow:"hidden"}}>
                  {/* Collaborator header — always visible, click to toggle */}
                  <div onClick={()=>toggle(userId)}
                    style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",cursor:"pointer",
                      borderLeft:`4px solid ${u.avatar_color}`,transition:".13s",
                      background:isOpen?"var(--bg3)":"var(--bg2)"}}>
                    <Av u={u} size={30}/>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:13,fontWeight:700}}>{u.name}</span>
                        {urgentes>0&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:3,background:"var(--s-vencida-bg)",color:"var(--s-vencida)",fontWeight:700,fontFamily:"var(--font-mono)"}}><Icon n="alerta" size={9}/> {urgentes} urgente{urgentes>1?"s":""}</span>}
                      </div>
                    </div>
                    {/* Task status mini-summary */}
                    <div style={{display:"flex",gap:5,alignItems:"center"}}>
                      {[
                        {s:"en_progreso",c:"var(--s-progreso)"},
                        {s:"en_revision",c:"var(--s-revision)"},
                        {s:"pendiente",c:"var(--s-pendiente)"},
                        {s:"vencida",c:"var(--s-vencida)"},
                      ].map(({s,c})=>{
                        const n=uTasks.filter(t=>t.status===s).length;
                        return n>0?<span key={s} style={{fontSize:10,padding:"2px 6px",borderRadius:3,background:c+"1a",color:c,fontWeight:700,fontFamily:"var(--font-mono)"}}>{n}</span>:null;
                      })}
                      <span style={{fontSize:13,fontWeight:800,color:loadColor,minWidth:22,textAlign:"right",fontFamily:"var(--font-display)",marginLeft:4}}>{uTasks.length}</span>
                    </div>
                    <span style={{color:"var(--muted)",fontSize:14,marginLeft:4,transition:"transform .2s",display:"inline-block",transform:isOpen?"rotate(0)":"rotate(-90deg)"}}>▼</span>
                  </div>
                  {/* Collapsible task list */}
                  {isOpen&&(
                    <div style={{padding:"6px 12px 12px"}}>
                      {uTasks.map(t=><TaskCard key={t.id} task={t} users={allUsers} teams={allTeams} me={me} token={token} onRefresh={onRefresh}/>)}
                    </div>
                  )}
                </div>
              );
            })}
            {unassigned.length>0&&(
              <div style={{marginTop:8}}>
                <p style={{fontSize:11,color:"var(--muted)",marginBottom:6,fontFamily:"var(--font-mono)"}}>Sin responsable asignado</p>
                {unassigned.map(t=><TaskCard key={t.id} task={t} users={allUsers} teams={allTeams} me={me} token={token} onRefresh={onRefresh}/>)}
              </div>
            )}
          </>
        )
      }
    </div>
  );
}

/* ── DASHBOARD ── */
function Dashboard({session,onLogout}){
  const {user,token}=session;
  const [tab,setTab]=useState("home");
  const [tabFilter,setTabFilter]=useState(null);
  const [mobileMenuOpen,setMobileMenuOpen]=useState(false);
  const [tasks,setTasks]=useState([]);
  const [users,setUsers]=useState([]);
  const [teams,setTeams]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showSpotlight,setShowSpotlight]=useState(false);
  const isDir=user.role==="director";

  // Theme — persisted in localStorage
  const [isDark,setIsDark]=useState(()=>{
    const saved=localStorage.getItem("lc_theme");
    return saved?saved==="dark":true; // default dark
  });
  useEffect(()=>{
    document.body.classList.toggle("light",!isDark);
    localStorage.setItem("lc_theme",isDark?"dark":"light");
  },[isDark]);
  function toggleTheme(){setIsDark(d=>!d);}

  // Cmd+K / Ctrl+K to open spotlight
  useEffect(()=>{
    function onKey(e){
      if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();setShowSpotlight(s=>!s);}
    }
    window.addEventListener("keydown",onKey);
    return()=>window.removeEventListener("keydown",onKey);
  },[]);

  const navigateTo=(newTab,filter=null)=>{setTab(newTab);setTabFilter(filter);setMobileMenuOpen(false);};

  const load=useCallback(async()=>{
    setLoading(true);
    try{
      const [t,u,eq]=await Promise.all([
        sb.get("tareas","select=*&order=created_at.desc",token),
        sb.get("usuarios","select=*",token),
        sb.get("equipos","select=*",token),
      ]);
      setTasks(Array.isArray(t)?t:[]);
      setUsers(Array.isArray(u)?u:[]);
      setTeams(Array.isArray(eq)?eq:[]);
    }catch(e){
      if(e.message==="SESSION_EXPIRED"){
        LS.del("lc_session");
        onLogout();
        showToast("Tu sesion expiro. Por favor ingresa de nuevo.","error");
      }else{console.error(e);}
    }
    setLoading(false);
  },[token]);

  useEffect(()=>{load();},[load]);

  const myT=isDir?tasks:tasks.filter(t=>t.assigned_to===user.id);
  const active=myT.filter(t=>t.status!=="completada");
  const done=myT.filter(t=>t.status==="completada");
  const withChanges=myT.filter(t=>t.changes>0);
  const overdue=myT.filter(t=>t.status==="vencida");
  const visibleNav=NAV.filter(n=>n.roles.includes(user.role));
  const sections=[...new Set(visibleNav.map(n=>n.section))];

  return(
    <div className="app-shell">
      {showSpotlight&&<Spotlight tasks={tasks} users={users} teams={teams} onNavigate={navigateTo} onClose={()=>setShowSpotlight(false)}/>}
      <ConfirmDialog/>
      {/* Mobile topbar */}

                  // Show only assigned teams, or all if none assigned
                  const myIds=Array.isArray(user.team_ids)&&user.team_ids.length>0?user.team_ids:null;
                  return myIds?myIds.includes(t.id):true;
                }
                // Colaborador: show all their teams (team_ids[] or fallback to team_id)
                const myIds=Array.isArray(user.team_ids)&&user.team_ids.length>0?user.team_ids:(user.team_id?[user.team_id]:[]);
                return myIds.includes(t.id);
              }).map(t=>{
                const active=tasks.filter(x=>x.team_id===t.id&&x.status!=="completada").length;
                const overdue=tasks.filter(x=>x.team_id===t.id&&x.status==="vencida").length;
                return(
                  <button key={t.id} className={`nav-item${tab==="equipo_"+t.id?" active":""}`}
                    onClick={()=>setTab("equipo_"+t.id)}
                    style={{paddingLeft:12}}>
                    <span style={{width:8,height:8,borderRadius:"50%",background:teamColor(t),flexShrink:0,display:"inline-block"}}/>
                    <span style={{flex:1,textAlign:"left",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:13}}>{t.name}</span>
                    <span style={{fontSize:11,fontWeight:600,color:overdue>0?"var(--red)":"var(--muted)",marginLeft:4}}>{active}</span>
                  </button>
                );
              })}
            </div>
          )}
        </nav>
        <div style={{borderTop:"1px solid var(--border)",paddingTop:16}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <Av u={user} size={32}/>
            <div style={{minWidth:0,flex:1}}>
              <p style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.name}</p>
              <p style={{fontSize:11,color:user.role==="director"?"var(--accent)":user.role==="cuentas"?"var(--yellow)":"var(--green)"}}>{user.role==="director"?"Director":user.role==="cuentas"?"Cuentas":"Colaborador"}</p>
            </div>
            {/* Theme toggle */}
            <button onClick={toggleTheme} title={isDark?"Cambiar a modo día":"Cambiar a modo noche"}
              style={{background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:8,
                padding:"6px 8px",cursor:"pointer",lineHeight:1,flexShrink:0,transition:".2s",
                color:"var(--muted2)",display:"flex",alignItems:"center",justifyContent:"center"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor="var(--accent)";e.currentTarget.style.color="var(--accent)";}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--border2)";e.currentTarget.style.color="var(--muted2)";}}>
              <Icon n={isDark?"sol":"luna"} size={15} color="currentColor"/>
            </button>
          </div>
          <button className="btn btn-ghost btn-sm" style={{width:"100%"}} onClick={onLogout}>Cerrar sesión</button>
        </div>
        </div>
      </aside>
      <main className="main-content"><div className="page-content">
        {loading
          ?<div className="fade-in">
            <div style={{marginBottom:20}}><div className="skeleton skeleton-title" style={{width:"45%",height:24}}/><div className="skeleton skeleton-text" style={{width:"30%"}}/></div>
            <div className="stat-grid" style={{marginBottom:20}}>
              {[1,2,3,4].map(i=><div key={i} className="skeleton" style={{height:88,borderRadius:10}}/>)}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:12,marginBottom:14}}>
              {[1,2].map(i=><div key={i} className="skeleton-card"><div className="skeleton skeleton-title"/><div className="skeleton skeleton-text"/><div className="skeleton skeleton-text" style={{width:"70%"}}/><div className="skeleton skeleton-text" style={{width:"50%"}}/></div>)}
            </div>
            {[1,2,3].map(i=><div key={i} className="skeleton-card"><div style={{display:"flex",gap:12,alignItems:"center"}}><div className="skeleton" style={{width:36,height:36,borderRadius:6,flexShrink:0}}/><div style={{flex:1}}><div className="skeleton skeleton-text" style={{width:"60%"}}/><div className="skeleton skeleton-text" style={{width:"40%"}}/></div></div></div>)}
          </div>
          :(
            <>

              {tab==="home"&&<HomeView tasks={tasks} users={users} teams={teams} me={user} token={token} onRefresh={load} onNavigate={(t,f)=>navigateTo(t,f||null)}/>}
              {tab==="ordenes"&&(
                <>
                  {isDir&&overdue.length>0&&(
                    <div style={{background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.2)",borderRadius:14,padding:16,marginBottom:20}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                        <Icon n="vencida" size={16} color="var(--s-vencida)"/>
                        <h3 style={{fontFamily:"var(--font-display)",fontSize:15,fontWeight:700,color:"#fca5a5"}}>Tareas vencidas ({overdue.length})</h3>
                      </div>
                      {overdue.map(t=>{
                        const u=users.find(x=>x.id===t.assigned_to);
                        const team=teams.find(x=>x.id===t.team_id);
                        return(
                          <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid rgba(239,68,68,.15)"}}>
                            {t.order_number&&<span style={{fontSize:11,fontWeight:700,color:"#fca5a5",minWidth:45}}>#{String(t.order_number).padStart(4,"0")}</span>}
                            <div style={{flex:1}}>
                              <p style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{t.title}</p>
                              <p style={{fontSize:11,color:"var(--muted)"}}>{u?.name||"Sin asignar"} · {team?.name||"Sin equipo"} · Venció: {t.due_date}</p>
                            </div>
                            <span style={{fontSize:11,padding:"2px 8px",borderRadius:999,background:"rgba(239,68,68,.15)",color:"#fca5a5"}}>{Math.ceil((new Date()-new Date(t.due_date))/(1000*60*60*24))}d tarde</span>
                          </div>
                        );
                      })}
                    </div>
                  )}
                  <OrdenesView tasks={tasks} users={users} teams={teams} me={user} token={token} onRefresh={load} onBack={()=>setTab("home")} initialFilter={tabFilter}/>
                </>
              )}
              {tab==="crear"    &&(isDir||user.role==="cuentas")&&<CreateTask users={users} teams={teams} tasks={tasks} me={user} token={token} onCreated={()=>{load();setTab("ordenes");}} onBack={()=>setTab("home")}/>}
              {tab==="equipos"  &&(isDir||user.role==="cuentas")&&<TeamsView tasks={tasks} users={users} teams={teams} onBack={()=>setTab("home")} onViewUser={u=>{setTab("desempeno");setTimeout(()=>window._perfSelectUser&&window._perfSelectUser(u),50);}} onOpenTask={t=>{setTab("ordenes");setTimeout(()=>window._openTask&&window._openTask(t),50);}}/>}
              {tab==="desempeno"&&isDir&&<PerformanceView tasks={tasks} users={users} teams={teams} onBack={()=>setTab("home")}/>}
              {tab==="admin"    &&isDir&&<AdminView users={users} teams={teams} tasks={tasks} token={token} onRefresh={load} setUsers={setUsers} onBack={()=>setTab("home")} onViewUser={u=>{setTab("desempeno");setTimeout(()=>window._perfSelectUser&&window._perfSelectUser(u),50);}}/>}
              {tab.startsWith("equipo_")&&(()=>{
                const teamId=tab.replace("equipo_","");
                const team=teams.find(t=>t.id===teamId);
                const teamTasks=tasks.filter(t=>{
                  if(isDir||user.role==="cuentas") return t.team_id===teamId;
                  const a=Array.isArray(t.assigned_to)?t.assigned_to:[t.assigned_to].filter(Boolean);
                  return t.team_id===teamId&&a.includes(user.id);
                });
                const teamUsers=users.filter(u=>u.team_id===teamId||(Array.isArray(u.team_ids)&&u.team_ids.includes(teamId)));
                if(!team)return null;
                return <TeamDetailView key={teamId} team={team} teamTasks={teamTasks} teamUsers={teamUsers} allUsers={users} allTeams={teams} me={user} token={token} onRefresh={load} onBack={()=>setTab("home")}/>;
              })()}
            </>
          )
        }
      </div></main>
    </div>
  );
}

function Login({onLogin}){
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [showForgot,setShowForgot]=useState(false);
  if(showForgot) return <ForgotPassword onBack={()=>setShowForgot(false)}/>;
  async function go(){
    if(!email||!pw){setErr("Completa correo y contraseña.");return;}
    setLoading(true);setErr("");
    try{
      const {profile,access_token}=await sb.signIn(email,pw);
      const session={user:profile,token:access_token};

function SetPassword(){
  const [pw,setPw]=useState("");
  const [pw2,setPw2]=useState("");
  const [loading,setLoading]=useState(false);
  const [done,setDone]=useState(false);
  const [err,setErr]=useState("");

  // Extract tokens from URL hash
  const hash=window.location.hash;
  const params=new URLSearchParams(hash.replace("#",""));
  const accessToken=params.get("access_token");
  const type=params.get("type");

  async function savePassword(){
    if(!pw||pw.length<6){setErr("La contrasena debe tener al menos 6 caracteres.");return;}
    if(pw!==pw2){setErr("Las contrasenas no coinciden.");return;}
    setLoading(true);setErr("");
    try{
      const r=await fetch(`${SB_URL}/auth/v1/user`,{
        method:"PUT",
        headers:{"Content-Type":"application/json","apikey":SB_ANON,"Authorization":`Bearer ${accessToken}`},
        body:JSON.stringify({password:pw}),
      });
      const d=await r.json();
      if(d.error)throw new Error(d.error_description||d.error);
      setDone(true);
      // Clear hash from URL
      window.history.replaceState(null,"",window.location.pathname);

        </p>
        <div className="form-group">
          <label className="form-label">Nueva contrasena</label>
          <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Minimo 6 caracteres"/>
        </div>
        <div className="form-group">
          <label className="form-label">Confirmar contrasena</label>
          <input type="password" value={pw2} onChange={e=>setPw2(e.target.value)} onKeyDown={e=>e.key==="Enter"&&savePassword()} placeholder="Repite tu contrasena"/>

          {loading?"Guardando...":"Crear contrasena e ingresar"}
        </button>
      </div>
    </div>
  );
}

function App(){
  const [session,setSession]=useState(()=>LS.get("lc_session",null));

  // Detect invite/recovery link
  const hash=window.location.hash;
  const params=new URLSearchParams(hash.replace("#",""));
  const type=params.get("type");
  const accessToken=params.get("access_token");
  const isInvite=(type==="invite"||type==="recovery")&&accessToken;

  if(isInvite) return <><Toast/><SetPassword/></>;

  return(
    <><Toast/>{session?<Dashboard session={session} onLogout={()=>{LS.del("lc_session");setSession(null);}}/>:<Login onLogin={s=>setSession(s)}/>}</>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
