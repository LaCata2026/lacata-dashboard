/* ── TASK CARD ── */
function TaskCard({task,users,teams,me,token,onRefresh}){
  const [modal,setModal]=useState(false);
  const [editing,setEditing]=useState(false);
  const [editForm,setEditForm]=useState({});
  const [activeTab,setActiveTab]=useState("detalles");
  const [commentText,setCommentText]=useState("");
  const [sendingComment,setSendingComment]=useState(false);
  const [mentionState,setMentionState]=useState({open:false,query:"",pos:0});
  const [showReassign,setShowReassign]=useState(false);
  const [showAddChange,setShowAddChange]=useState(false);
  const [imgPreview,setImgPreview]=useState(null); // fullscreen image preview
  const textareaRef=useRef(null);
  const commentsEndRef=useRef(null);
  useEffect(()=>{
    function onKey(e){if(e.key==="Escape"){setModal(false);setEditing(false);setImgPreview(null);}}
    window.addEventListener("keydown",onKey);
    return()=>window.removeEventListener("keydown",onKey);
  },[]);
  useEffect(()=>{
    if(activeTab==="conversacion"&&commentsEndRef.current)commentsEndRef.current.scrollIntoView({behavior:"smooth"});
  },[activeTab,task.comments?.length]);

  const comments=Array.isArray(task.comments)?task.comments:[];
  const isDir=me.role==="director"||me.role==="cuentas";
  const team=teams.find(t=>t.id===task.team_id);

  // Last activity timestamp
  const lastActivity=(()=>{
    const history=task.history||[];
    const comments=Array.isArray(task.comments)?task.comments:[];
    let latest=task.created_at?new Date(task.created_at):null;
    comments.forEach(c=>{const d=new Date(c.created_at);if(d>latest)latest=d;});
    if(!latest)return null;
    const diff=Date.now()-latest.getTime();
    const h=Math.floor(diff/3600000);
    if(h<1)return"hace un momento";
    if(h<24)return`hace ${h}h`;
    const d=Math.floor(h/24);
    return`hace ${d}d`;
  })();

  async function changeStatus(s){
    const now=new Date();const nowStr=now.toLocaleString("es-GT");const prev=task.status;
    let newHoursReal=Number(task.hours_real)||0;let entry="";
    if(prev==="en_progreso"&&task.started_at&&(s==="en_pausa"||s==="en_revision"||s==="completada")){
      const started=new Date(task.started_at);const diffH=Math.round(((now-started)/3600000)*100)/100;
      newHoursReal=Math.round((newHoursReal+diffH)*100)/100;
      if(s==="en_revision")entry=`🔍 ${me.name} envió a revisión — ${nowStr} (⏱ ${diffH}h sesión · total: ${newHoursReal}h — reloj detenido)`;
      else if(s==="en_pausa")entry=`⏸ ${me.name} → Pausa — ${nowStr} (${diffH}h sesión · total: ${newHoursReal}h)`;
      else entry=`✅ ${me.name} completó — ${nowStr} — Total: ${newHoursReal}h`;
    } else if(s==="en_progreso"){entry=`⚡ ${me.name} inició trabajo — ${nowStr}`;
    } else if(s==="en_revision"&&prev!=="en_progreso"){entry=`🔍 ${me.name} envió a revisión — ${nowStr}`;
    } else if(s==="completada"){entry=`✅ ${me.name} marcó como completada — ${nowStr} — Total: ${newHoursReal}h reales`;
    } else {entry=`${statusLabel[s]} — ${me.name} — ${nowStr}`;}
    const h=[...(task.history||[]),entry];
    const updates={status:s,history:h,hours_real:newHoursReal,
      started_at:s==="en_progreso"?now.toISOString():(prev==="en_progreso"?null:task.started_at||null)};
    await sb.update("tareas",task.id,updates,token);
    showToast("Estado: "+statusLabel[s],"success");onRefresh();
  }

  async function del(){
    const ok=await showConfirm(`¿Eliminar "${task.title}"?`,{
      title:"Eliminar orden",confirmLabel:"Sí, eliminar",confirmColor:"var(--s-vencida)",
      detail:`Esta acción no se puede deshacer. AC-${String(task.order_number||0).padStart(4,"0")}`});
    if(!ok)return;
    await sb.del("tareas",task.id,token);
    showToast("Orden eliminada","success");setModal(false);onRefresh();
  }

  async function saveEdit(){
    const h=[...(task.history||[]),`Editado por ${me.name} — ${new Date().toLocaleString("es-GT")}`];
    await sb.update("tareas",task.id,{
      title:editForm.title||task.title,
      description:editForm.description||task.description,
      materials:editForm.materials||task.materials||"",
      hours:Number(editForm.hours)||task.hours||0,
      due_date:editForm.due_date||task.due_date,
      priority:editForm.priority||task.priority,
      history:h,
    },token);
    showToast("Orden actualizada","success");
    setEditing(false);
    onRefresh();
  }

  async function postComment(){
    const trimmed=commentText.trim();
    if(!trimmed||sendingComment)return;
    setSendingComment(true);
    try{
      // Extract mentioned user IDs from @name pattern
      const mentions=[];
      users.forEach(u=>{
        const handle="@"+u.name.split(" ")[0].toLowerCase();
        if(trimmed.toLowerCase().includes(handle))mentions.push(u.id);
      });
      const newComment={
        id:Date.now()+"-"+Math.random().toString(36).slice(2,8),
        user_id:me.id,
        user_name:me.name,
        user_color:me.avatar_color||"#888",
        text:trimmed,
        mentions,
        created_at:new Date().toISOString(),
      };
      const updated=[...comments,newComment];
      await sb.update("tareas",task.id,{comments:updated},token);
      setCommentText("");
      setMentionState({open:false,query:"",pos:0});
      onRefresh();
    }catch(e){showToast("Error al enviar comentario: "+e.message,"error");}
    setSendingComment(false);
  }

  function handleCommentInput(e){
    const val=e.target.value;
    const pos=e.target.selectionStart;
    setCommentText(val);
    // Detect @ mention trigger
    const before=val.substring(0,pos);
    const match=before.match(/@(\w*)$/);
    if(match){
      setMentionState({open:true,query:match[1].toLowerCase(),pos});
    } else {
      setMentionState({open:false,query:"",pos});
    }
  }

  function insertMention(user){
    const firstName=user.name.split(" ")[0];
    const before=commentText.substring(0,mentionState.pos);
    const after=commentText.substring(mentionState.pos);
    const newBefore=before.replace(/@\w*$/,`@${firstName} `);
    setCommentText(newBefore+after);
    setMentionState({open:false,query:"",pos:0});
    textareaRef.current?.focus();
  }

  function onCommentKey(e){
    if(e.key==="Enter"&&(e.metaKey||e.ctrlKey)){e.preventDefault();postComment();}
    if(e.key==="Escape"&&mentionState.open){e.preventDefault();setMentionState({open:false,query:"",pos:0});}
  }
  return(
    <div className="task-card fade-in" style={{
      cursor:"pointer",
      borderLeft:`3px solid ${statusColor[task.status]||"var(--border2)"}`,
      paddingLeft:15,
      opacity:(task.status==="completada"&&me.role!=="director"&&me.role!=="cuentas")?0.6:1,
      transition:"opacity .2s",
      outline:task.priority==="Urgente"?`1px solid ${statusColor.vencida}33`:"none",
    }} onClick={()=>setModal(true)}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:7,alignItems:"center"}}>
            {task.order_number&&<span style={{fontSize:11,fontWeight:700,color:"var(--accent)",fontFamily:"monospace"}}>#{"AC-"+String(task.order_number).padStart(4,"0")}</span>}
            <span className={`pill ${prioPill[task.priority]||"pill-gray"}`}>{task.priority}</span>
            <span className={`pill ${statusPill[task.status]||"pill-gray"}`}>{statusLabel[task.status]||task.status}</span>
            {task.changes>0&&<span className="pill pill-purple"><Icon n="cambio" size={10}/> {task.changes}</span>}
            {comments.length>0&&<span className="pill" style={{background:"rgba(155,127,232,.12)",color:"var(--s-revision)"}}><Icon n="comentar" size={10}/> {comments.length}</span>}
            {team&&(()=>{const tc=teamColor(team);return <span className="pill" style={{background:tc+"22",color:tc}}>{team.name}</span>;})()}
          </div>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:6}}>{task.title}</h3>
          <div style={{display:"flex",gap:12,flexWrap:"wrap",fontSize:12,color:"var(--muted)",alignItems:"center"}}>
            {(()=>{
              const al=Array.isArray(task.assigned_to)?task.assigned_to:[task.assigned_to].filter(Boolean);
              return al.map(id=>users.find(u=>u.id===id)).filter(Boolean).map(u=>(
                <span key={u.id} style={{display:"flex",alignItems:"center",gap:4}}>
                  <Av u={u} size={18}/><span>{u.name}</span>
                </span>
              ));
            })()}
            {(()=>{const dr=fmtDateRelative(task.due_date);return(<span style={{color:dr.color,fontWeight:dr.urgent?700:400,background:dr.urgent?"rgba(240,107,107,.08)":"transparent",padding:dr.urgent?"2px 6px":"0",borderRadius:5}}><Icon n="tiempo" size={11} style={{marginRight:3}}/>{dr.label}</span>);})()}
            {task.status==="en_progreso"&&task.started_at
              ?<ActiveTimer startedAt={task.started_at} hoursReal={task.hours_real}/>
              :task.hours>0&&<span>⏱ {task.hours}h</span>}
            {task.hours_real>0&&task.status!=="en_progreso"&&<span style={{color:"var(--s-completada)"}}>✓ {task.hours_real}h real</span>}
            {lastActivity&&<span style={{color:"var(--muted)",fontSize:11}}>{lastActivity}</span>}
          </div>
        </div>
        <span style={{fontSize:12,color:"var(--accent)",flexShrink:0,padding:"4px 10px",background:"rgba(139,92,246,.1)",borderRadius:8}}>Ver detalle ↗</span>
      </div>
      {/* TASK DETAIL MODAL */}
      {modal&&(
        <ModalPortal>
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)setModal(false);}}>
          <div className="modal fade-in" onClick={e=>e.stopPropagation()}>
             <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,gap:12}}>
               <div style={{flex:1}}>
                 {task.order_number&&(
                   <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                     <span style={{fontSize:12,fontWeight:700,padding:"3px 10px",borderRadius:999,background:"var(--accent-dim)",color:"var(--accent)",fontFamily:"monospace"}}>{"AC-"+String(task.order_number).padStart(4,"0")+" "+task.title}</span>
                     <button onClick={(e)=>{
  navigator.clipboard.writeText("AC-"+String(task.order_number).padStart(4,"0")+" "+task.title);
  e.target.textContent="✓";
  e.target.style.color="var(--green)";
  setTimeout(()=>{e.target.innerHTML='<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="8" height="8" rx="1.5"/><path d="M5 5V3.5A1.5 1.5 0 0 1 6.5 2H12a1.5 1.5 0 0 1 1.5 1.5V11"/></svg>';e.target.style.color="";},1500);
}} style={{background:"var(--bg3)",border:"none",cursor:"pointer",color:"var(--muted)",fontSize:13,padding:"2px 6px",borderRadius:6,transition:".2s"}}><Icon n="copia" size={13}/></button>
                   </div>
                 )}
                 {editing
                   ?<input value={editForm.title||task.title} onChange={e=>setEditForm(f=>({...f,title:e.target.value}))} style={{fontSize:18,fontWeight:700,width:"100%",marginBottom:4}}/>
                   :<h2 style={{fontSize:20,fontWeight:700}}>{task.title}</h2>
                 }
               </div>
               <div style={{display:"flex",gap:6,flexShrink:0,alignItems:"center"}}>
                 {(isDir||me.role==="cuentas")&&!editing&&<button onClick={()=>{setEditing(true);setEditForm({title:task.title,description:task.description||"",materials:task.materials||"",hours:task.hours,due_date:task.due_date,priority:task.priority});}} style={{background:"var(--accent-dim)",border:"none",cursor:"pointer",color:"var(--accent)",fontSize:13,padding:"5px 12px",borderRadius:8,fontFamily:"inherit"}}><Icon n="editar" size={14}/> Editar</button>}
                 {editing&&<button onClick={saveEdit} style={{background:"var(--green)",border:"none",cursor:"pointer",color:"#fff",fontSize:13,padding:"5px 12px",borderRadius:8,fontFamily:"inherit",fontWeight:600}}>Guardar</button>}
                 {editing&&<button onClick={()=>setEditing(false)} style={{background:"var(--bg3)",border:"none",cursor:"pointer",color:"var(--muted)",fontSize:13,padding:"5px 12px",borderRadius:8,fontFamily:"inherit"}}>Cancelar</button>}
                 <button onClick={(e)=>{e.stopPropagation();setModal(false);setEditing(false);}} style={{background:"var(--bg3)",border:"none",cursor:"pointer",color:"var(--muted)",fontSize:18,padding:"4px 10px",borderRadius:8,zIndex:999,position:"relative"}}>✕</button>
               </div>
             </div>
            {(isDir||me.role==="cuentas"||(Array.isArray(task.assigned_to)?task.assigned_to:[task.assigned_to]).includes(me.id))&&(
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
                {[
                  {v:"pendiente",  icon:"pendiente",label:"Pendiente",  c:"var(--s-pendiente)", bg:"var(--s-pendiente-bg)"},
                  {v:"en_progreso",icon:"progreso",label:"En progreso",c:"var(--s-progreso)",  bg:"var(--s-progreso-bg)"},
                  {v:"en_pausa",   icon:"pausa",label:"En pausa",   c:"var(--s-pausa)",     bg:"var(--s-pausa-bg)"},
                  {v:"en_revision",icon:"revision",label:"Revisión",   c:"var(--s-revision)",  bg:"var(--s-revision-bg)"},
                  {v:"completada", icon:"completada",label:"Completada", c:"var(--s-completada)",bg:"var(--s-completada-bg)"},
                  ...((isDir||me.role==="cuentas")?[{v:"vencida",icon:"vencida",label:"Vencida",c:"var(--s-vencida)",bg:"var(--s-vencida-bg)"}]:[])
                ].map(s=>(
                  <button key={s.v} onClick={()=>changeStatus(s.v)}
                    style={{padding:"5px 12px",borderRadius:7,fontSize:12,cursor:"pointer",fontFamily:"inherit",transition:".13s",
                      border:task.status===s.v?`2px solid ${s.c}`:"1px solid var(--border)",
                      background:task.status===s.v?s.bg:"transparent",
                      color:task.status===s.v?s.c:"var(--muted)",
                      fontWeight:task.status===s.v?700:400}}>
                    <><Icon n={s.icon} size={14} style={{marginRight:4}}/>{s.label}</>
                  </button>
                ))}
              </div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              <div style={{background:"var(--bg3)",borderRadius:10,padding:"10px 14px"}}>
                <p style={{fontSize:11,color:"var(--muted)",marginBottom:4,textTransform:"uppercase",letterSpacing:".4px"}}>Responsables</p>
                {(Array.isArray(task.assigned_to)?task.assigned_to:[task.assigned_to].filter(Boolean)).map(id=>{const u=users.find(x=>x.id===id);return u?<span key={id} style={{display:"flex",alignItems:"center",gap:4,fontSize:13,marginBottom:2}}><div style={{width:18,height:18,borderRadius:"50%",background:u.avatar_color,fontSize:7,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{u.initials}</div>{u.name}</span>:null;})}
              </div>
              <div style={{background:"var(--bg3)",borderRadius:10,padding:"10px 14px"}}>
                <p style={{fontSize:11,color:"var(--muted)",marginBottom:4,textTransform:"uppercase",letterSpacing:".4px"}}>Fechas y horas</p>
                <p style={{fontSize:13}}><Icon n="tiempo" size={12} style={{marginRight:4}}/>{(()=>{const dr=fmtDateRelative(task.due_date);return <span style={{color:dr.color,fontWeight:dr.urgent?700:400}}>{dr.label}</span>;})()}</p>
                <p style={{fontSize:12,color:"var(--muted)",marginTop:2}}>⏱ Est: {task.hours||0}h {task.hours_real>0&&<span style={{color:"var(--green)"}}>· Real: {task.hours_real}h</span>}</p>
              </div>
            </div>
            {editing?(
              <>
                <div style={{marginBottom:12}}>
                  <p style={{fontSize:11,color:"var(--muted)",fontWeight:600,textTransform:"uppercase",letterSpacing:".4px",marginBottom:6}}>Brief</p>
                  <textarea value={editForm.description||""} onChange={e=>setEditForm(f=>({...f,description:e.target.value}))} style={{width:"100%",minHeight:80}}/>
                </div>
                <div style={{marginBottom:12}}>
                  <p style={{fontSize:11,color:"var(--yellow)",fontWeight:600,marginBottom:6}}>📦 Materiales</p>
                  <textarea value={editForm.materials||""} onChange={e=>setEditForm(f=>({...f,materials:e.target.value}))} style={{width:"100%",minHeight:60}}/>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
                  <div><p style={{fontSize:11,color:"var(--muted)",marginBottom:4}}>Horas est.</p><input type="number" value={editForm.hours||""} onChange={e=>setEditForm(f=>({...f,hours:e.target.value}))}/></div>
                  <div><p style={{fontSize:11,color:"var(--muted)",marginBottom:4}}>Fecha límite</p><input type="date" value={editForm.due_date||""} onChange={e=>setEditForm(f=>({...f,due_date:e.target.value}))}/></div>
                  <div><p style={{fontSize:11,color:"var(--muted)",marginBottom:4}}>Prioridad</p>
                    <select value={editForm.priority||"Normal"} onChange={e=>setEditForm(f=>({...f,priority:e.target.value}))}>
                      <option>Normal</option><option>Alta</option><option>Urgente</option>
                    </select>
                  </div>
                </div>
                <div style={{marginBottom:12}}>
                  <p style={{fontSize:11,color:"var(--muted)",marginBottom:6}}>Agregar archivos</p>
                  <label className="file-drop" style={{minHeight:60}}>
                    <><Icon n="adjunto" size={16} style={{marginBottom:4}}/><span>Arrastra o haz clic para agregar archivos</span></>
                    <input type="file" multiple onChange={async(e)=>{
                      const newFiles=[...e.target.files];
                      showToast("Subiendo archivos...","info");
                      const MAX_SIZE=50*1024*1024;
const uploaded=[];
                      for(const file of newFiles){
                        try{
                          const u=await sb.uploadFile(file,"task-"+task.id);
                          uploaded.push({name:file.name,url:u.url,path:u.path});
                        }catch(err){uploaded.push({name:file.name,url:null,path:null});}
                      }
                      const existing=task.files||[];
                      const allFiles=[...existing,...uploaded];
                      await sb.update("tareas",task.id,{files:allFiles},token);
                      showToast("Archivos agregados","success");
                      onRefresh();
                    }}/>
                  </label>
                </div>
              </>
            ):(
              <>
                {task.description&&<div style={{background:"var(--bg3)",borderRadius:10,padding:"12px 14px",marginBottom:12}}><p style={{fontSize:11,color:"var(--muted)",fontWeight:600,textTransform:"uppercase",letterSpacing:".4px",marginBottom:6}}>Brief</p><Linkify text={task.description} style={{fontSize:13,color:"var(--muted2)",lineHeight:1.6,display:"block"}}/></div>}
                {task.materials&&<div style={{background:"rgba(245,158,11,.08)",border:"1px solid rgba(245,158,11,.2)",borderRadius:10,padding:"12px 14px",marginBottom:12}}><p style={{fontSize:11,color:"var(--yellow)",fontWeight:600,marginBottom:4}}>📦 Materiales</p><Linkify text={task.materials} style={{fontSize:13,color:"var(--muted2)",lineHeight:1.5,display:"block"}}/></div>}
              </>
            )}
            {task.files&&task.files.length>0&&(
              <div style={{background:"var(--bg3)",borderRadius:10,padding:"12px 14px",marginBottom:12}}>
                <p style={{fontSize:11,color:"var(--muted)",fontWeight:600,textTransform:"uppercase",letterSpacing:".4px",marginBottom:8}}>Archivos adjuntos</p>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-start"}}>
                  {task.files.map((f,idx)=>{
                    const fileName=typeof f==="object"?f.name:f;
                    const fileUrl=typeof f==="object"?f.url:null;
                    const fileExt=(fileName||"").split(".").pop().toLowerCase();
                    const isImg=["jpg","jpeg","png","gif","webp","svg"].includes(fileExt);
                    const iconN=isImg?"adjunto":["pdf"].includes(fileExt)?"detalles":["mp4","mov","avi"].includes(fileExt)?"progreso":["ai","psd","eps","fig"].includes(fileExt)?"editar":"adjunto";
                    if(isImg&&fileUrl){
                      return(
                        <div key={idx} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                          <img src={fileUrl} alt={fileName} className="img-preview"
                            onClick={()=>setImgPreview(fileUrl)}
                            title={fileName}/>
                          <span style={{fontSize:10,color:"var(--muted)",maxWidth:64,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fileName}</span>
                        </div>
                      );
                    }
                    return fileUrl?(
                      <a key={idx} href={fileUrl} target="_blank" rel="noopener noreferrer"
                        style={{fontSize:12,padding:"6px 12px",background:"var(--bg4)",borderRadius:8,color:"var(--accent)",cursor:"pointer",border:"1px solid rgba(232,197,71,.2)",display:"flex",alignItems:"center",gap:6,textDecoration:"none"}}>
                        <><Icon n={iconN} size={12}/> {fileName}</> <span style={{fontSize:10,color:"var(--muted)"}}>↓</span>
                      </a>
                    ):(
                      <span key={idx} style={{fontSize:12,padding:"6px 12px",background:"var(--bg4)",borderRadius:8,color:"var(--muted2)",display:"flex",alignItems:"center",gap:6}}>
                        {icon} {fileName}
                      </span>
                    );
                  })}
                </div>
              </div>
            )}
            {/* TABS: Detalles vs Conversación */}
            <div style={{display:"flex",gap:0,borderBottom:"1px solid var(--border)",marginBottom:14,marginTop:6}}>
              {[
                {v:"detalles",l:"detalles",icon:"detalles",c:(task.history||[]).length},
                {v:"conversacion",l:"conversacion",icon:"comentar",c:comments.length},
              ].map(t=>(
                <button key={t.v} onClick={()=>setActiveTab(t.v)}
                  style={{background:"none",border:"none",borderBottom:activeTab===t.v?"2px solid var(--accent)":"2px solid transparent",
                    padding:"8px 14px",cursor:"pointer",fontFamily:"inherit",fontSize:13,
                    color:activeTab===t.v?"var(--text)":"var(--muted)",
                    fontWeight:activeTab===t.v?700:500,marginBottom:-1,transition:".13s"}}>
                  {<Icon n={t.icon} size={13} style={{marginRight:5}}/>}{t.v==="detalles"?"Detalles":"Conversación"}
                  {t.c>0&&<span style={{marginLeft:6,fontSize:10,padding:"1px 6px",borderRadius:10,background:activeTab===t.v?"var(--accent)":"var(--bg4)",color:activeTab===t.v?"#0d0d0d":"var(--muted2)",fontWeight:700,fontFamily:"var(--font-mono)"}}>{t.c}</span>}
                </button>
              ))}
            </div>

            {/* DETALLES TAB — historial */}
            {activeTab==="detalles"&&(
              <div style={{background:"var(--bg3)",borderRadius:10,padding:"12px 14px"}}>
                <p style={{fontSize:11,color:"var(--muted)",fontWeight:600,textTransform:"uppercase",letterSpacing:".4px",marginBottom:8}}>Historial</p>
                {(task.history||[]).length===0?<p style={{fontSize:13,color:"var(--muted)"}}>Sin historial aun.</p>:(task.history||[]).map((h,i)=><p key={i} style={{fontSize:12,color:"var(--muted2)",padding:"4px 0",borderBottom:"1px solid var(--border)"}}><span style={{color:"var(--muted)",fontSize:11,marginRight:6}}>#{i+1}</span><Linkify text={h}/></p>)}
              </div>
            )}

            {/* CONVERSACIÓN TAB */}
            {activeTab==="conversacion"&&(
              <div>
                {/* Comments list */}
                <div style={{background:"var(--bg3)",borderRadius:10,padding:"12px 14px",maxHeight:360,overflowY:"auto",marginBottom:12}}>
                  {comments.length===0
                    ?<div style={{textAlign:"center",padding:"24px 12px",color:"var(--muted)",fontSize:13}}>
                      <div style={{fontSize:32,opacity:.4,marginBottom:6}}><Icon n="comentar" size={32} color="currentColor"/></div>
                      Aún no hay conversación.<br/>
                      <span style={{fontSize:11}}>Comenta cambios, dudas, decisiones o feedback del cliente.</span>
                    </div>
                    :comments.map(c=>{
                      const isMe=c.user_id===me.id;
                      const author=users.find(u=>u.id===c.user_id);
                      const mentioned=Array.isArray(c.mentions)&&c.mentions.includes(me.id);
                      const t=new Date(c.created_at);
                      const timeStr=t.toLocaleString("es-GT",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});
                      return(
                        <div key={c.id} style={{display:"flex",gap:9,padding:"8px 0",borderBottom:"1px solid var(--border)",alignItems:"flex-start",
                          background:mentioned?"rgba(232,197,71,.04)":"transparent",
                          borderLeft:mentioned?"2px solid var(--accent)":"2px solid transparent",
                          paddingLeft:mentioned?8:0,marginLeft:mentioned?-8:0}}>
                          <Av u={author||{initials:c.user_name?.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()||"?",avatar_color:c.user_color||"#888"}} size={28}/>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:2,flexWrap:"wrap"}}>
                              <span style={{fontSize:12,fontWeight:700,color:c.user_color||(author?.avatar_color)||"var(--text)"}}>{c.user_name||author?.name||"?"}</span>
                              {isMe&&<span style={{fontSize:9,color:"var(--muted)",padding:"1px 5px",background:"var(--bg4)",borderRadius:3,fontFamily:"var(--font-mono)"}}>tú</span>}
                              {mentioned&&!isMe&&<span style={{fontSize:9,color:"var(--accent)",fontWeight:700,fontFamily:"var(--font-mono)"}}>@MENCIÓN</span>}
                              <span style={{fontSize:10,color:"var(--muted)",fontFamily:"var(--font-mono)"}}>{timeStr}</span>
                            </div>
                            <div style={{fontSize:13,color:"var(--text)",lineHeight:1.5,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>
                              {(()=>{
                                // Render with @mentions highlighted + URLs
                                const parts=c.text.split(/(@\w+|https?:\/\/[^\s]+)/g);
                                return parts.map((p,i)=>{
                                  if(p.startsWith("@")){
                                    const name=p.slice(1).toLowerCase();
                                    const u=users.find(x=>x.name.split(" ")[0].toLowerCase()===name);
                                    return u?<span key={i} style={{color:u.avatar_color,fontWeight:700,background:u.avatar_color+"1a",padding:"0 4px",borderRadius:3}}>{p}</span>:<span key={i}>{p}</span>;
                                  }
                                  if(p.match(/^https?:\/\//))return <a key={i} href={p} target="_blank" rel="noopener noreferrer" style={{color:"var(--accent)",textDecoration:"underline",textDecorationStyle:"dotted",wordBreak:"break-all"}}>{p}</a>;
                                  return <span key={i}>{p}</span>;
                                });
                              })()}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  <div ref={commentsEndRef}/>
                </div>

                {/* Comment composer */}
                <div style={{position:"relative"}}>
                  <textarea ref={textareaRef} value={commentText} onChange={handleCommentInput} onKeyDown={onCommentKey}
                    placeholder="Comenta cambios, menciona con @nombre, comparte links..."
                    style={{minHeight:70,fontSize:13,paddingRight:80,resize:"vertical"}}/>
                  <button onClick={postComment} disabled={!commentText.trim()||sendingComment}
                    style={{position:"absolute",right:8,bottom:8,padding:"6px 14px",
                      background:commentText.trim()?"var(--accent)":"var(--bg4)",
                      color:commentText.trim()?"#0d0d0d":"var(--muted)",
                      fontWeight:700,fontSize:12,border:"none",borderRadius:6,
                      cursor:commentText.trim()?"pointer":"not-allowed",fontFamily:"inherit",transition:".13s"}}>
                    {sendingComment?"...":"Enviar"}
                  </button>
                  {/* Mention autocomplete */}
                  {mentionState.open&&(()=>{
                    const matches=users.filter(u=>u.name.toLowerCase().includes(mentionState.query)).slice(0,5);
                    if(matches.length===0)return null;
                    return(
                      <div style={{position:"absolute",bottom:"100%",left:0,marginBottom:4,background:"var(--bg2)",border:"1px solid var(--border2)",borderRadius:8,padding:4,minWidth:200,boxShadow:"0 8px 24px rgba(0,0,0,.4)",zIndex:10}}>
                        {matches.map(u=>(
                          <div key={u.id} onClick={()=>insertMention(u)}
                            style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",cursor:"pointer",borderRadius:5,transition:".1s"}}
                            onMouseEnter={e=>e.currentTarget.style.background="var(--bg3)"}
                            onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                            <Av u={u} size={22}/>
                            <span style={{fontSize:13,fontWeight:600}}>{u.name}</span>
                            <span style={{fontSize:11,color:"var(--muted)",fontFamily:"var(--font-mono)",marginLeft:"auto"}}>@{u.name.split(" ")[0].toLowerCase()}</span>
                          </div>
                        ))}
                      </div>
                    );
                  })()}
                </div>
                <p style={{fontSize:11,color:"var(--muted)",marginTop:6,fontFamily:"var(--font-mono)"}}>
                  ⌘+Enter para enviar · @nombre para mencionar · los links se vuelven clicables
                </p>
              </div>
            )}
            {(isDir||me.role==="cuentas")&&(
              <div style={{display:"flex",gap:8,marginTop:14,justifyContent:"flex-end",flexWrap:"wrap"}}>
                <button className="btn btn-ghost btn-sm" onClick={()=>setShowReassign(true)}><Icon n="equipo2" size={14}/> Reasignar</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>setShowAddChange(true)}><Icon n="cambio" size={14}/> + Cambio</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>duplicateTask(task,token,()=>{onRefresh();})}><Icon n="duplicar" size={14}/> Duplicar</button>
                <button className="btn btn-danger btn-sm" onClick={del}><Icon n="eliminar" size={14}/> Eliminar</button>
              </div>
            )}
          </div>
        </div>
        </ModalPortal>
      )}
      {showReassign&&<ReassignModal task={task} users={users} teams={teams} token={token} me={me} onClose={()=>setShowReassign(false)} onRefresh={onRefresh}/>}
      {showAddChange&&<AddChangeModal task={task} token={token} me={me} onClose={()=>setShowAddChange(false)} onRefresh={onRefresh}/>}
      {imgPreview&&ReactDOM.createPortal(
        <div onClick={()=>setImgPreview(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",zIndex:900,display:"flex",alignItems:"center",justifyContent:"center",cursor:"zoom-out"}}>
          <img src={imgPreview} alt="" style={{maxWidth:"90vw",maxHeight:"90vh",borderRadius:8,boxShadow:"0 0 80px rgba(0,0,0,.8)"}}/>
        </div>,
        document.body
      )}
    </div>
  );
}

/* ── CREATE TASK ── */
function CreateTask({users,teams,tasks,me,token,onCreated,onBack}){
  const blank={title:"",description:"",assigned_to:[],team_id:"",priority:"Normal",hours:"",due_date:"",status:"pendiente",materials:"",marca:""};
  const [form,setForm]=useState(blank);
  const [files,setFiles]=useState([]);
  const [loading,setLoading]=useState(false);
  const [showOtra,setShowOtra]=useState(false);
  const [errors,setErrors]=useState({});
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  function validate(){
    const e={};
    if(!form.title.trim())e.title="Nombre del proyecto requerido";
    if(!form.marca)e.marca="Selecciona o escribe una marca";
    if(!form.description.trim())e.description="El brief es requerido";
    if(!form.assigned_to||form.assigned_to.length===0)e.assigned_to="Selecciona al menos un responsable";
    if(!form.due_date)e.due_date="Fecha límite requerida";
    setErrors(e);
    return Object.keys(e).length===0;
  }
  async function submit(){
    if(!validate())return;
    // Team assignment priority:
    // 1. Manually selected team (form.team_id)
    // 2. Active team filter (form._teamFilter if it's a real team, not "todos")
    // 3. Primary team of first assigned user
    let finalTeamId=form.team_id;
    if(!finalTeamId&&form._teamFilter&&form._teamFilter!=="todos"){
      finalTeamId=form._teamFilter;
    }
    if(!finalTeamId&&form.assigned_to.length>0){
      const firstUser=users.find(u=>u.id===form.assigned_to[0]);
      finalTeamId=firstUser?.team_id||"";
    }
    const formWithTeam={...form,team_id:finalTeamId};
    setLoading(true);
    try{
      // Get next order number
      const existing=await sb.get("tareas","select=order_number&order=order_number.desc&limit=1",token);
      const lastNum=Array.isArray(existing)&&existing.length>0&&existing[0].order_number?existing[0].order_number:0;
      const orderNum=lastNum+1;
      const {_teamFilter,...formData}=formWithTeam;
      // Upload files to storage
      let fileData=[];
      for(const file of files){
        if(file.size>MAX_SIZE){showToast("Archivo muy grande (max 50MB): "+file.name,"error");continue;}
        try{
          const uploaded=await sb.uploadFile(file,"task-"+orderNum);
          fileData.push({name:file.name,url:uploaded.url,path:uploaded.path});
        }catch(e){
          fileData.push({name:file.name,url:null,path:null});
          console.warn("File upload failed:",file.name);
        }
      }
      await sb.insert("tareas",{...formData,hours:Number(formData.hours)||0,changes:0,materials:formData.materials||"",marca:formData.marca||"",order_number:orderNum,history:["Orden AC-"+String(orderNum).padStart(4,"0")+" creada — "+new Date().toLocaleDateString("es-GT")],files:fileData,created_by:me.id},token);
      showToast("Orden creada ✓","success");setForm(blank);setFiles([]);onCreated();
    }catch(e){alert("Error: "+e.message);}
    setLoading(false);
  }
  return(
    <div>
      {onBack&&<BackBtn onClick={onBack}/>}
      <div className="section-header"><h2 className="section-title">Nueva orden de trabajo</h2></div>
      <div className="card fade-in" style={{maxWidth:680}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:12}}>
          <div style={{gridColumn:"1/-1"}}>
            <label className="form-label">Nombre del proyecto *</label>
            <input value={form.title} onChange={e=>{set("title")(e);if(errors.title)setErrors(v=>({...v,title:""}));}}
              placeholder="Ej: Campaña verano Claro" className={errors.title?"field-error":""}/>
            {errors.title&&<p className="field-hint">{errors.title}</p>}
          </div>
          <div><label className="form-label">Marca / Cliente *</label>
            {(()=>{
              const existing=[...new Set(tasks.map(t=>t.marca).filter(Boolean))];
              const allMarcas=[...new Set([...MARCAS_PREDEFINIDAS,...existing])].sort();
              return(
                <>
                  <select value={showOtra?"__otra__":form.marca||""} onChange={e=>{
                    if(e.target.value==="__otra__"){setShowOtra(true);setForm(f=>({...f,marca:""}));}
                    else{setShowOtra(false);setForm(f=>({...f,marca:e.target.value}));}
                  }} style={{marginBottom:showOtra?6:0}}>
                    <option value="">— Seleccionar marca —</option>
                    {allMarcas.map(m=><option key={m} value={m}>{m}</option>)}
                    <option value="__otra__">✏️ Otra / cliente emergente</option>
                  </select>
                  {showOtra&&(
                    <div style={{display:"flex",gap:6,alignItems:"center",marginTop:6}}>
                      <input value={form.marca||""} onChange={set("marca")} placeholder="Nombre del cliente o marca nueva" autoFocus style={{flex:1}}/>
                      <button type="button" onClick={()=>{setShowOtra(false);setForm(f=>({...f,marca:""}));}} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:18,lineHeight:1,padding:"0 4px",flexShrink:0}}>×</button>
                    </div>
                  )}
                </>
              );
            })()}
          </div>
          <div><label className="form-label">Equipo (manual)</label>
            <select value={form.team_id} onChange={e=>setForm(f=>({...f,team_id:e.target.value,_teamFilter:e.target.value||"todos"}))}>
              <option value="">Auto-detectar desde responsable</option>
              {teams.map(t=><option key={t.id} value={t.id}>{<Icon n={t.icon||"equipos"} size={16}/>} {t.name}</option>)}
            </select>
          </div>
          <div style={{gridColumn:"1/-1"}}><label className="form-label">Brief y especificaciones *</label><textarea value={form.description} onChange={set("description")} placeholder="Entregables, formatos, dimensiones..."/></div>
          <div style={{gridColumn:"1/-1"}}>
            <label className="form-label">Responsables *</label>
            <div style={{background:"var(--bg3)",borderRadius:12,border:"1px solid var(--border)",padding:14}}>
              <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
                {teams.map(t=>(
                  <button key={t.id} type="button" onClick={()=>setForm(f=>({...f,_teamFilter:t.id,team_id:t.id}))}
                    style={{padding:"4px 12px",borderRadius:999,fontSize:12,cursor:"pointer",fontFamily:"inherit",background:form._teamFilter===t.id?teamColor(t):"var(--bg4)",color:form._teamFilter===t.id?"#fff":"var(--muted2)",border:"none"}}>
                    {t.name}
                  </button>
                ))}
                <button type="button" onClick={()=>setForm(f=>({...f,_teamFilter:"todos",team_id:""}))}
                  style={{padding:"4px 12px",borderRadius:999,fontSize:12,cursor:"pointer",fontFamily:"inherit",background:(!form._teamFilter||form._teamFilter==="todos")?"var(--accent)":"var(--bg4)",color:(!form._teamFilter||form._teamFilter==="todos")?"#fff":"var(--muted2)",border:"none"}}>
                  Todos
                </button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(72px,1fr))",gap:8}}>
                {users.filter(u=>{
                  if(u.role!=="colaborador")return false;
                  if(!form._teamFilter||form._teamFilter==="todos")return true;
                  // Check both team_id (primary) AND team_ids[] (multi-team)
                  const inPrimary=u.team_id===form._teamFilter;
                  const inMulti=Array.isArray(u.team_ids)&&u.team_ids.includes(form._teamFilter);
                  return inPrimary||inMulti;
                }).map(u=>{
                  const sel=(form.assigned_to||[]).includes(u.id);
                  const taskCount=tasks.filter(t=>{const a=Array.isArray(t.assigned_to)?t.assigned_to:[t.assigned_to].filter(Boolean);return a.includes(u.id)&&t.status!=="completada";}).length;
                  const loadColor=taskCount>=7?"var(--red)":taskCount>=5?"var(--yellow)":u.avatar_color;
                  return(
                    <button key={u.id} type="button" onClick={()=>{
                      const cur=form.assigned_to||[];
                      setForm(f=>({...f,assigned_to:sel?cur.filter(x=>x!==u.id):[...cur,u.id]}));
                    }} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"10px 6px",borderRadius:10,cursor:"pointer",fontFamily:"inherit",background:sel?"var(--accent-dim)":"var(--bg4)",border:sel?"2px solid var(--accent)":"2px solid transparent",position:"relative",transition:".15s"}}>
                      {sel&&<span style={{position:"absolute",top:4,right:4,fontSize:10,background:"var(--accent)",color:"#fff",borderRadius:"50%",width:14,height:14,display:"flex",alignItems:"center",justifyContent:"center"}}>✓</span>}
                      <div style={{width:36,height:36,borderRadius:"50%",background:u.avatar_color,fontSize:13,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{u.initials}</div>
                      <span style={{fontSize:11,fontWeight:500,color:sel?"var(--purple2)":"var(--text)",textAlign:"center",lineHeight:1.2}}>{u.name.split(" ")[0]}</span>
                      <span style={{fontSize:10,color:loadColor,fontWeight:600}}>{taskCount} tareas</span>
                      <div style={{width:"100%",height:3,background:"var(--bg3)",borderRadius:2,overflow:"hidden"}}>
                        <div style={{width:Math.min(100,taskCount/8*100)+"%",height:"100%",background:loadColor,borderRadius:2}}/>
                      </div>
                    </button>
                  );
                })}
                {users.filter(u=>u.role==="colaborador").length===0&&<p style={{fontSize:13,color:"var(--muted)",gridColumn:"1/-1",textAlign:"center",padding:16}}>No hay colaboradores registrados aun.</p>}
              </div>
              {(form.assigned_to||[]).length>0&&(
                <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid var(--border)",display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{fontSize:11,color:"var(--muted)"}}>Seleccionados:</span>
                  {(form.assigned_to||[]).map(id=>{
                    const u=users.find(x=>x.id===id);
                    if(!u)return null;
                    return(
                      <span key={id} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 8px",borderRadius:5,background:"var(--accent)",color:"#0d0d0d",fontSize:12,fontWeight:600}}>
                        {u.name.split(" ")[0]}
                        <button type="button" onClick={()=>setForm(f=>({...f,assigned_to:(f.assigned_to||[]).filter(x=>x!==id)}))} style={{background:"none",border:"none",color:"#0d0d0d",cursor:"pointer",fontSize:12,padding:0,lineHeight:1,opacity:.7}}>×</button>
                      </span>
                    );
                  })}
                </div>
              )}
              {(()=>{
                if((form.assigned_to||[]).length===0)return null;
                // Mirror the submit logic: manual > filter > user's primary team
                let teamId=form.team_id;
                if(!teamId&&form._teamFilter&&form._teamFilter!=="todos")teamId=form._teamFilter;
                if(!teamId){const fu=users.find(u=>u.id===(form.assigned_to||[])[0]);teamId=fu?.team_id||"";}
                const detectedTeam=teams.find(t=>t.id===teamId);
                if(!detectedTeam)return null;
                const isManual=!!form.team_id;
                const tc=teamColor(detectedTeam);
                return(
                  <div style={{marginTop:8,padding:"8px 12px",background:tc+"14",border:`1px solid ${tc}44`,borderRadius:7,display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:tc,flexShrink:0}}/>
                    <span style={{fontSize:12,color:"var(--muted2)"}}>
                      {isManual?"Equipo seleccionado:":form._teamFilter&&form._teamFilter!=="todos"?"Equipo del filtro:":"Equipo auto-detectado:"} <strong style={{color:tc}}>{detectedTeam.name}</strong>
                    </span>
                    {!isManual&&<span style={{fontSize:11,color:"var(--muted)",marginLeft:"auto"}}>{form._teamFilter&&form._teamFilter!=="todos"?"desde filtro activo":"desde responsable"}</span>}
                  </div>
                );
              })()}
            </div>
          </div>
          <div><label className="form-label">Prioridad</label>
            <select value={form.priority} onChange={set("priority")}><option>Normal</option><option>Alta</option><option>Urgente</option></select>
          </div>
          <div><label className="form-label">Horas estimadas</label><input type="number" value={form.hours} onChange={set("hours")} placeholder="Ej: 16" min="1"/></div>
          <div><label className="form-label">Fecha límite *</label><input type="date" value={form.due_date} onChange={set("due_date")}/></div>
          <div><label className="form-label">Estado inicial</label>
            <select value={form.status} onChange={set("status")}><option value="pendiente">Pendiente</option><option value="en_progreso">En progreso</option></select>
          </div>
          <div style={{gridColumn:"1/-1"}}>
            <label className="form-label">Materiales necesarios</label>
            <textarea value={form.materials||""} onChange={e=>setForm(f=>({...f,materials:e.target.value}))} placeholder="Lista de materiales, insumos o recursos necesarios para esta tarea..." style={{minHeight:70}}/>
          </div>
          <div style={{gridColumn:"1/-1"}}>
            <label className="form-label">Referencias / archivos</label>
            <label className="file-drop">
              <Icon n="adjunto" size={22} color="var(--muted)"/><span>Arrastra archivos o haz clic</span>
              <span style={{fontSize:12,color:"var(--muted)"}}>PDF, PNG, JPG, AI, MP4</span>
              <input type="file" multiple onChange={e=>setFiles([...e.target.files])}/>
            </label>
            {files.length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>{files.map((f,i)=><span key={i} style={{fontSize:12,padding:"3px 10px",background:"var(--bg3)",borderRadius:999,color:"var(--muted2)"}}><Icon n="adjunto" size={11} style={{marginRight:4}}/>{f.name}</span>)}</div>}
          </div>
        </div>
        <button className="btn btn-primary" style={{width:"100%",marginTop:20,padding:13,fontSize:15,fontWeight:700}} onClick={submit} disabled={loading}>{loading?"Creando...":"Crear orden de trabajo"}</button>
      </div>
    </div>
  );
}

/* ── TEAMS ── */
function TeamsView({tasks,users,teams,onBack,onViewUser,onOpenTask}){
  const [selectedTeam,setSelectedTeam]=useState("all");
  const [openMembers,setOpenMembers]=useState({}); // {userId: true}
  const filteredTeams=selectedTeam==="all"?teams:teams.filter(t=>t.id===selectedTeam);
  const toggleMember=(id)=>setOpenMembers(o=>({...o,[id]:!o[id]}));
  return(
    <div>
      {onBack&&<BackBtn onClick={onBack}/>}
      <div className="section-header"><h2 className="section-title">Equipos y carga de trabajo</h2></div>
      <div className="filter-bar" style={{marginBottom:16}}>
        <button className={`filter-chip${selectedTeam==="all"?" active":""}`} onClick={()=>setSelectedTeam("all")}>Todos</button>
        {teams.map(t=>{const tc=teamColor(t);return <button key={t.id} className={`filter-chip${selectedTeam===t.id?" active":""}`} style={selectedTeam===t.id?{background:tc,borderColor:tc,color:"#fff"}:{}} onClick={()=>setSelectedTeam(t.id)}>{<Icon n={t.icon||"equipos"} size={16}/>} {t.name}</button>;})}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(340px,1fr))",gap:16}}>
        {filteredTeams.map(team=>{
          const members=users.filter(u=>(u.team_id===team.id||(Array.isArray(u.team_ids)&&u.team_ids.includes(team.id)))&&u.role==="colaborador");
          const teamTasks=tasks.filter(t=>t.team_id===team.id&&t.status!=="completada");
          // Health for color dot
          const overdueCount=tasks.filter(t=>t.team_id===team.id&&t.status==="vencida").length;
          const overloaded=members.filter(u=>tasks.filter(x=>{const a=Array.isArray(x.assigned_to)?x.assigned_to:[x.assigned_to].filter(Boolean);return a.includes(u.id)&&x.status!=="completada";}).length>=7).length;
          const avgLoad=members.length>0?teamTasks.length/members.length:0;
          const health=overdueCount>0||overloaded>0?"var(--s-vencida)":avgLoad>=4?"var(--load-warn)":"var(--load-ok)";
          return(
            <div key={team.id} className="card fade-in">
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:20}}>{<Icon n={team.icon||"equipos"} size={18} style={{display:"inline-block"}}/>}</span>
                  <div>
                    <h3 style={{fontSize:15,fontWeight:700}}>{team.name}</h3>
                    <p style={{fontSize:11,color:"var(--muted)",marginTop:1,fontFamily:"var(--font-mono)"}}>{members.length} miembros · {teamTasks.length} activas</p>
                  </div>
                </div>
                <div style={{width:10,height:10,borderRadius:"50%",background:health,boxShadow:`0 0 8px ${health}66`}}/>
              </div>
              {members.length===0&&<p style={{fontSize:13,color:"var(--muted)",textAlign:"center",padding:20}}>Sin miembros asignados</p>}
              {members.map(m=>{
                const mTasks=tasks.filter(t=>{const a=Array.isArray(t.assigned_to)?t.assigned_to:[t.assigned_to].filter(Boolean);return a.includes(m.id)&&t.status!=="completada";});
                const mOverdue=mTasks.filter(t=>t.status==="vencida").length;
                const pct=Math.min(100,Math.round(mTasks.length/8*100));
                const loadColor=mTasks.length>=7?"var(--s-vencida)":mTasks.length>=4?"var(--load-warn)":m.avatar_color;
                const isOpen=!!openMembers[m.id];
                return(
                  <div key={m.id} style={{marginBottom:8,background:"var(--bg3)",borderRadius:8,overflow:"hidden",border:"1px solid var(--border)"}}>
                    {/* Collaborator header — clickable to expand */}
                    <div onClick={()=>toggleMember(m.id)}
                      style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",cursor:"pointer",userSelect:"none",
                        borderLeft:`3px solid ${m.avatar_color}`,transition:".13s",
                        background:isOpen?"var(--bg4)":"transparent"}}>
                      <span style={{color:"var(--muted)",fontSize:11,transition:"transform .2s",display:"inline-block",transform:isOpen?"rotate(0)":"rotate(-90deg)",flexShrink:0}}>▼</span>
                      {/* Avatar — click goes to user's tasks */}
                      <div onClick={e=>{e.stopPropagation();onViewUser&&onViewUser(m);}}
                        style={{cursor:onViewUser?"pointer":"default"}}
                        title={onViewUser?"Ver perfil y todas sus tareas":""}>
                        <Av u={m} size={28}/>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                          <span style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.name}</span>
                          {mOverdue>0&&<span style={{fontSize:10,padding:"1px 5px",borderRadius:3,background:"var(--s-vencida-bg)",color:"var(--s-vencida)",fontWeight:700,fontFamily:"var(--font-mono)"}}><Icon n="alerta" size={9}/>{mOverdue}</span>}
                        </div>
                      </div>
                      <span style={{fontSize:14,fontWeight:800,color:loadColor,fontFamily:"var(--font-display)",minWidth:24,textAlign:"right"}}>{mTasks.length}</span>
                      <span style={{fontSize:10,color:"var(--muted)",fontFamily:"var(--font-mono)"}}>{mTasks.length===1?"tarea":"tareas"}</span>
                    </div>
                    {/* Load progress bar — always visible */}
                    <div style={{height:2,background:"var(--bg2)",overflow:"hidden"}}>
                      <div style={{width:`${pct}%`,height:"100%",background:loadColor,transition:"width .6s cubic-bezier(.4,0,.2,1)"}}/>
                    </div>
                    {/* Collapsed expansion — tasks list */}
                    {isOpen&&(
                      <div style={{padding:"8px 10px",background:"var(--bg3)"}}>
                        {mTasks.length===0
                          ?<p style={{fontSize:11,color:"var(--muted)",padding:6,textAlign:"center"}}>Sin tareas activas 🎉</p>
                          :mTasks.map(t=>{
                            const dr=fmtDateRelative(t.due_date);
                            return(
                              <div key={t.id} onClick={()=>onOpenTask&&onOpenTask(t)}
                                style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",borderRadius:6,marginBottom:3,
                                  background:"var(--bg2)",borderLeft:`3px solid ${statusColor[t.status]||"var(--border)"}`,
                                  cursor:onOpenTask?"pointer":"default",transition:".13s"}}
                                onMouseEnter={e=>e.currentTarget.style.background="var(--bg4)"}
                                onMouseLeave={e=>e.currentTarget.style.background="var(--bg2)"}>
                                {t.order_number&&<span style={{fontSize:10,color:"var(--accent)",fontFamily:"var(--font-mono)",flexShrink:0,minWidth:40,fontWeight:700}}>AC-{String(t.order_number).padStart(4,"0")}</span>}
                                <span style={{fontSize:12,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</span>
                                {t.priority!=="Normal"&&<span className={`pill pill-prio-${t.priority.toLowerCase()}`} style={{fontSize:9,padding:"1px 5px"}}>{t.priority}</span>}
                                <span className={`pill ${statusPill[t.status]||"pill-gray"}`} style={{fontSize:9,padding:"1px 5px"}}>{statusLabel[t.status]}</span>
                                <span style={{fontSize:10,color:dr.color,fontWeight:dr.urgent?700:400,flexShrink:0,fontFamily:"var(--font-mono)"}}>{dr.label}</span>
                              </div>
                            );
                          })
                        }
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── PERFORMANCE ── */
function PerformanceView({tasks,users,teams,onBack}){
  const [viewMode,setViewMode]=useState("individual");
  const [selectedUser,setSelectedUser]=useState(null);
  // Expose setter so other components (Admin) can navigate to a user directly
  useEffect(()=>{window._perfSelectUser=setSelectedUser;return()=>{window._perfSelectUser=null;};},[]); // drill-down
  const colabs=users.filter(u=>u.role==="colaborador");
  const sorted=[...colabs].sort((a,b)=>{
    const at=tasks.filter(t=>{const x=Array.isArray(t.assigned_to)?t.assigned_to:[t.assigned_to].filter(Boolean);return x.includes(a.id)&&t.status!=="completada";}).length;
    const bt=tasks.filter(t=>{const x=Array.isArray(t.assigned_to)?t.assigned_to:[t.assigned_to].filter(Boolean);return x.includes(b.id)&&t.status!=="completada";}).length;
    return bt-at;
  });

  // Drill-down: show selected collaborator's tasks
  if(selectedUser){
    const u=selectedUser;
    const team=teams.find(t=>t.id===u.team_id);

/* ── EXCEL EXPORT ── */
function exportExcel(tasks,users,teams){
  const statusMap={pendiente:"Pendiente",en_progreso:"En progreso",en_pausa:"En pausa",en_revision:"En revision",completada:"Completada",vencida:"Vencida"};

  function buildRows(taskList){
    return taskList.map(t=>{
      const assigned=Array.isArray(t.assigned_to)?t.assigned_to:[t.assigned_to].filter(Boolean);
      const names=assigned.map(id=>users.find(u=>u.id===id)?.name||"?").join(", ");
      const team=teams.find(x=>x.id===t.team_id);
      return{
        "No. Orden":"AC-"+String(t.order_number||0).padStart(4,"0"),
        "Proyecto":t.title||"",
        "Responsable":names||"Sin asignar",
        "Marca":t.marca||"—",
        "Equipo":team?.name||"Sin equipo",
        "Estado":statusMap[t.status]||t.status||"",
        "Prioridad":t.priority||"Normal",
        "Horas Est.":Number(t.hours)||0,
        "Horas Reales":Number(t.hours_real)||0,
        "Diferencia":t.hours_real>0?Math.round((Number(t.hours_real)-Number(t.hours))*100)/100:"—",
        "Fecha Límite":t.due_date||"",
        "Cambios":t.changes||0,
      };
    });
  }

  if(typeof XLSX==="undefined"){
    // Fallback to CSV if SheetJS not loaded
    const header=["No. Orden","Proyecto","Responsable","Marca","Horas Est.","Horas Reales"];
    const lines=[header.join(",")];
    tasks.forEach(t=>{
      const assigned=Array.isArray(t.assigned_to)?t.assigned_to:[t.assigned_to].filter(Boolean);
      const names=assigned.map(id=>users.find(u=>u.id===id)?.name||"?").join(" + ");
      lines.push(["AC-"+String(t.order_number||0).padStart(4,"0"),t.title||"",names,t.marca||"",t.hours||0,t.hours_real||0].join(","));
    });
    const blob=new Blob([lines.join("\n")],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="LaCata_"+new Date().toISOString().split("T")[0]+".csv";a.click();
    URL.revokeObjectURL(url);
    showToast("Reporte CSV descargado","success");
    return;
  }

  const wb=XLSX.utils.book_new();

  // Tab 1: Todas las órdenes
  const allRows=buildRows(tasks);
  const wsAll=XLSX.utils.json_to_sheet(allRows);
  // Column widths
  wsAll["!cols"]=[{wch:12},{wch:36},{wch:22},{wch:18},{wch:18},{wch:14},{wch:10},{wch:10},{wch:12},{wch:10},{wch:14},{wch:8}];
  XLSX.utils.book_append_sheet(wb,wsAll,"Todas las órdenes");

  // Tabs por marca
  const marcas=[...new Set(tasks.map(t=>t.marca||"Sin marca").filter(Boolean))].sort();
  marcas.forEach(marca=>{
    const mTasks=tasks.filter(t=>(t.marca||"Sin marca")===marca);
    const rows=buildRows(mTasks);
    if(rows.length===0)return;

    // Summary row per collaborator for this brand
    const collabMap={};
    mTasks.forEach(t=>{
      const assigned=Array.isArray(t.assigned_to)?t.assigned_to:[t.assigned_to].filter(Boolean);
      assigned.forEach(id=>{
        const u=users.find(x=>x.id===id);
        if(!collabMap[id])collabMap[id]={nombre:u?.name||"?",horasEst:0,horasReal:0,tareas:0};
        collabMap[id].horasEst+=Number(t.hours)||0;
        collabMap[id].horasReal+=Number(t.hours_real)||0;
        collabMap[id].tareas++;
      });
    });

    const ws=XLSX.utils.json_to_sheet(rows);
    ws["!cols"]=[{wch:12},{wch:36},{wch:22},{wch:18},{wch:18},{wch:14},{wch:10},{wch:10},{wch:12},{wch:10},{wch:14},{wch:8}];

    // Add summary block after data
    const startRow=rows.length+3;
    XLSX.utils.sheet_add_aoa(ws,[["— Resumen por colaborador —"," "," "],[" Responsable"," Tareas"," Hrs Est."," Hrs Real"]],{origin:{r:startRow,c:0}});
    Object.values(collabMap).forEach((c,i)=>{
      XLSX.utils.sheet_add_aoa(ws,[[c.nombre,c.tareas,c.horasEst,c.horasReal]],{origin:{r:startRow+2+i,c:0}});
    });

    // Total de horas de la marca
    const totalEst=mTasks.reduce((s,t)=>s+Number(t.hours||0),0);
    const totalReal=mTasks.reduce((s,t)=>s+Number(t.hours_real||0),0);
    XLSX.utils.sheet_add_aoa(ws,[[" "],["TOTAL HORAS MARCA:",totalEst,"Reales:",totalReal]],{origin:{r:startRow+Object.keys(collabMap).length+3,c:0}});

    const sheetName=marca.substring(0,31).replace(/[\\\/\?\*\[\]]/g,"_");
    XLSX.utils.book_append_sheet(wb,ws,sheetName);
  });

  XLSX.writeFile(wb,"LaCata_Reporte_"+new Date().toISOString().split("T")[0]+".xlsx");
  showToast("Excel descargado con "+marcas.length+" tabs de marca","success");
}

  })).sort((a,b)=>b.active-a.active);
  const maxLoad=Math.max(...workload.map(w=>w.active),1);

            <div className="stat-card" style={{"--ac":"var(--green)"}}>
